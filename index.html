<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TDY Checklist">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F1923">
<meta name="mobile-web-app-capable" content="yes">
<title>TDY Mission Checklist</title>
<style>
  :root {
    --green:        #00C87A;
    --green-bg:     #003D26;
    --green-text:   #00FF9A;
    --amber:        #FFB800;
    --amber-bg:     #3D2D00;
    --blue:         #3DA8FF;
    --blue-bg:      #002040;
    --coral:        #FF6040;
    --coral-bg:     #3D1000;
    --purple:       #C8A0FF;
    --purple-bg:    #1E0A40;
 
    --bg:           #000000;
    --surface:      #111111;
    --surface2:     #1A1A1A;
    --border:       #2A2A2A;
    --border-bright:#404040;
    --text:         #F0F4F8;
    --muted:        #8AAABB;
    --done-text:    #4A6070;
 
    --radius:    10px;
    --radius-sm:  6px;
    --font-size-item: 16px;
    --font-size-label: 13px;
  }
 
  /* Optional light mode override — still high contrast */
  @media (prefers-color-scheme: light) {
    :root {
      --green:        #007A45;
      --green-bg:     #C8F0DC;
      --green-text:   #004D28;
      --amber:        #8A5A00;
      --amber-bg:     #FFF0C0;
      --blue:         #0050A0;
      --blue-bg:      #C8DFFF;
      --coral:        #8A2800;
      --coral-bg:     #FFD5C8;
      --purple:       #5028B0;
      --purple-bg:    #E0D5FF;
 
      --bg:           #D8E0E8;
      --surface:      #FFFFFF;
      --surface2:     #EDF2F7;
      --border:       #8AAABB;
      --border-bright:#4A7090;
      --text:         #080E14;
      --muted:        #2A4055;
      --done-text:    #8AAABB;
    }
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
    font-size: var(--font-size-item);
    min-height: 100vh;
    padding-bottom: 96px;
  }
 
  /* ── HEADER ─────────────────────────────────────────── */
  .header {
    background: var(--surface);
    border-bottom: 2px solid var(--border-bright);
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: var(--text);
    text-transform: uppercase;
  }
  .reset-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border-bright);
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .reset-btn:active { opacity: 0.6; }
 
  /* ── SEARCH ─────────────────────────────────────────── */
  .search-wrap { position: relative; margin-bottom: 10px; }
  .search-icon {
    position: absolute; left: 11px; top: 50%;
    transform: translateY(-50%);
    width: 17px; height: 17px;
    color: var(--muted); pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 9px 34px 9px 36px;
    border: 1.5px solid var(--border-bright);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--green); }
  .search-input::placeholder { color: var(--muted); }
  .search-clear {
    position: absolute; right: 9px; top: 50%;
    transform: translateY(-50%);
    background: var(--muted); border: none;
    border-radius: 50%; width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0;
    opacity: 0; transition: opacity 0.15s; pointer-events: none;
  }
  .search-clear.visible { opacity: 1; pointer-events: auto; }
  .search-clear svg { width: 10px; height: 10px; color: white; }
 
  /* ── PROGRESS ───────────────────────────────────────── */
  .progress-stats {
    display: flex; justify-content: space-between;
    font-size: var(--font-size-label);
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .progress-track {
    background: var(--border);
    border-radius: 4px; height: 6px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--green);
    border-radius: 4px;
    transition: width 0.35s cubic-bezier(.4,0,.2,1);
  }
 
  /* ── SEARCH RESULTS LABEL ───────────────────────────── */
  .search-results-label {
    display: none;
    font-size: 13px; font-weight: 600;
    color: var(--muted);
    padding: 8px 16px 0;
  }
  .search-results-label.visible { display: block; }
  .no-results {
    display: none;
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 16px;
  }
  .no-results.visible { display: block; }
 
  /* ── TABS ───────────────────────────────────────────── */
  .tabs {
    display: flex; overflow-x: auto; gap: 6px;
    padding: 10px 16px 0;
    scrollbar-width: none;
    background: var(--surface);
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tabs.search-active { display: none; }
  .tab {
    flex-shrink: 0;
    border: 1.5px solid var(--border-bright);
    background: var(--surface2);
    color: var(--muted);
    font-size: 13px; font-weight: 700;
    padding: 7px 13px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.12s;
    white-space: nowrap;
    display: flex; align-items: center; gap: 7px;
  }
  .tab-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border-bright);
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .tab.active {
    border-color: var(--green);
    background: var(--green-bg);
    color: var(--green-text);
  }
  .tab.active .tab-dot { background: var(--green); }
  .tab:active { transform: scale(0.96); }
 
  /* ── SECTION ────────────────────────────────────────── */
  .section { display: none; padding: 12px 16px 0; }
  .section.active { display: block; }
 
  /* Section color-band label (search mode) */
  .section-search-label {
    display: none;
    font-size: 11px; font-weight: 800;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 10px; border-radius: 4px;
    margin-bottom: 6px; width: fit-content;
    background: var(--green-bg); color: var(--green-text);
  }
  .section.search-active { display: block !important; }
  .section.search-active .section-search-label { display: inline-block; }
 
  /* ── GROUP HEADER ───────────────────────────────────── */
  .group-header {
    font-size: 12px; font-weight: 800;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted);
    padding: 14px 0 6px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1.5px solid var(--border);
    margin-bottom: 4px;
  }
  .group-header.search-hidden { display: none !important; }
 
  /* ── CHECKLIST ──────────────────────────────────────── */
  .checklist { display: flex; flex-direction: column; gap: 3px; }
  .check-item.search-hidden { display: none !important; }
 
  .check-item {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-left: 4px solid var(--border-bright);
    border-radius: var(--radius-sm);
    padding: 13px 14px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
    user-select: none;
    min-height: 52px;
  }
  .check-item:active { background: var(--surface2); }
 
  /* Color accent on left border by section color */
  .accent-plan  { border-left-color: var(--blue); }
  .accent-ops   { border-left-color: var(--purple); }
  .accent-crit  { border-left-color: var(--coral); }
  .accent-pack  { border-left-color: var(--amber); }
 
  .check-item.done {
    background: var(--surface2);
    border-color: var(--border);
    border-left-color: var(--border);
  }
  .check-item.done .item-label {
    text-decoration: line-through;
    color: var(--done-text);
  }
 
  /* ── CHECKBOX ───────────────────────────────────────── */
  .checkbox {
    width: 26px; height: 26px; flex-shrink: 0;
    border: 2px solid var(--border-bright);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    background: var(--surface2);
  }
  .check-item.done .checkbox {
    background: var(--green);
    border-color: var(--green);
  }
  .checkmark { display: none; width: 13px; height: 10px; }
  .checkmark path { stroke: #000; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .check-item.done .checkmark { display: block; }
 
  /* ── ITEM TEXT ──────────────────────────────────────── */
  .item-content { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .item-label {
    font-size: var(--font-size-item);
    font-weight: 600;
    line-height: 1.35;
    color: var(--text);
  }
 
  /* ── NOTES ──────────────────────────────────────────── */
  .item-notes {
    font-size: 14px;
    padding: 7px 10px;
    border: 1.5px solid var(--border-bright);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    font-family: inherit;
    width: 100%; outline: none;
    transition: border-color 0.15s;
  }
  .item-notes:focus { border-color: var(--green); }
  .item-notes::placeholder { color: var(--muted); }
  .check-item.done .item-notes { opacity: 0.5; }
 
  /* ── SEARCH HIGHLIGHT ───────────────────────────────── */
  .search-highlight {
    background: var(--amber);
    color: #000;
    border-radius: 2px;
    padding: 0 1px;
  }
 
  /* ── BOTTOM SUMMARY ─────────────────────────────────── */
  .phase-summary {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 2px solid var(--border-bright);
    padding: 10px 20px 26px;
    display: flex; justify-content: space-around;
  }
  .phase-stat { text-align: center; }
  .phase-stat .ps-num {
    font-size: 22px; font-weight: 800;
    letter-spacing: -0.5px;
  }
  .phase-stat .ps-label {
    font-size: 11px; font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-top: 2px;
  }
</style>
</head>
<body>
 
<div class="header">
  <div class="header-top">
    <h1>TDY Checklist</h1>
    <button class="reset-btn" onclick="resetAll()">Reset</button>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="8.5" cy="8.5" r="5.5"/><path d="M15 15l-3-3"/>
    </svg>
    <input type="search" class="search-input" id="search-input"
      placeholder="Search checklist…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="search-clear" id="search-clear" aria-label="Clear search">
      <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M2 2l6 6M8 2l-6 6"/>
      </svg>
    </button>
  </div>
  <div class="progress-stats">
    <span id="prog-label">0 of 0 complete</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>
 
<div class="tabs" id="tabs-nav"></div>
 
<div class="search-results-label" id="search-results-label"></div>
<div class="no-results" id="no-results">No items match your search.</div>
 
<div id="sections-wrap"></div>
<div class="phase-summary" id="phase-summary"></div>
 
<script>
const SECTIONS = [
  {
    id: 'mission-planning', label: 'Mission Planning', color: 'plan',
    groups: [
      { title: 'Mission Docs', items: [
        'G2 Mission Setup Sheet (Remarks)', '1801, Form 200', 'WX, NOTAMs, TOLD',
        'Departure Procedures (+SDP)', 'FAA International NOTAMs', 'Foreign Clearance Guide (FCG)',
        'Reporting Instructions', 'Area Planning (AP)', 'IFR Supplement',
        'ASRR / Giant Reports (TT)', 'Supp Theater Info File (STIF)',
        'CMD / Mission Spins (CP print)', 'Coronet Spins (tacc.us.af.mil)',
        'Electronic Mission Folder (EMF)', 'AVANA Time confirmed', 'ALTRAV confirmed',
      ]},
      { title: 'Considerations', items: [
        'Emergency Airfields reviewed', 'Operating / Quiet Hours checked',
        'Gross Weight calculated', 'Aircraft Configuration confirmed', 'Aircraft Lockbox (2 Seperate for Guns + Secrets)',
        'GSA Locks for each lockbox', 'CDT / FDP reviewed (202v3 AMCSUP Ch 3)', 'Ground Times / Crew Rest planned',
      ]},
      { title: 'Overseas / OCONUS', items: [
        'AE Information reviewed', 'Local IFG / Arrival Guide printed',
        'Print Airfield Diagrams', 'Release Space-A Seats?',
        'Cargo / Pax Manifest (DD Form 2131)', 'Formation reviewed', 'Tactics reviewed',
        'PPR Req submitted', 'MM Channel established',
        'Guns (aircraft lockbox or armory hrs)', 'Secrets / SKL (CP storage)',
        'TDY Kit / Stratus Puck / PCMIA Cards', 'Current DAFIF / Next Cycle confirmed',
        'Aero App Cycle confirmed', 'Courrier Letter (Security Mgr)',
        'Aircrew Gouge (Ops, local area, etc)', 'Crew Qualification / Currency (Tactics)',
        'Airfield Servicing Facilities / Equipment', 'Aircraft Parking / Security',
        'Customs requirements reviewed', 'LRS A, B, or C Bags packed',
        'AFE D Bags or AERPS Gear ready',
      ]},
      { title: 'Oceanic / Long Range', items: [
        'Oceanic Checklist (Goodreader)', 'Oceanic Plotting Chart',
        'Equal Time Point (ETP) calculated', 'Divert Locations identified',
        'NAT Track NOTAMs reviewed', 'DIPS checked',
        'Coord INTEL / SERE Briefings', 'HF Radios, SATCOM, CPDLC (MX verified)',
      ]},
    ]
  },
  {
    id: 'pre-departure', label: 'Pre-Departure', color: 'ops',
    groups: [
      { title: 'Crew Actions', items: [
        'TDY Group Text established', 'Crew Brief Time established',
        'FCC Contact Info distributed', 'Out-Processing Checklist complete',
        'Check MERS / Print ITS', 'DTS Authorization confirmed (per diem noted)',
        'GTC Check', 'Tax Exempt Letter', 'Lodging Reservations confirmed',
        'POV Long-term Parking arranged', 'U-Drive / Rental Car reserved',
        'Destination WX checked', 'Flight Meals / Water arranged',
      ]},
      { title: 'Friends & Contacts', items: [
        'Friends / Contacts at Destination noted', 'Rally Plan established', 'Haircut',
      ]},
    ]
  },
  {
    id: 'day-of-flight', label: 'Day of Flight', color: 'crit',
    groups: [
      { title: 'Pre-Flight Checks', items: [
        'Review / Initial Flight Authorizations', 'Make copies of FAs',
        'NATO Orders (if req)', 'Download Crew Papers (IFM)',
        'WX, NOTAMs, TOLD (Climbout Cap)', 'Training Folders — Instructors',
        '1801 Filed with Base Ops', 'Formation Kneeboard / Coord Card',
        'Cargo / Pax Status & Timing', 'Sign FCIFs / Read Files', 'ORM completed',
      ]},
      { title: 'EFBs', items: [
        'Current EPUBs (EFB Placard)', 'Current IOS loaded', 'Battery status checked',
      ]},
      { title: 'Aircraft / Gear', items: [
        'TDY Kit / Stratus Puck / PCMIA Cards loaded', 'Secrets / SKL loaded',
        'Guns & GSA Lock secured', 'Water Jug loaded', 'Case of H2O from Pax Terminal',
      ]},
      { title: 'Mission Papers', items: [
        'ORM copy loaded', 'Form F copy loaded', '781s copy loaded',
        '791s copy loaded', 'Customs Forms (if req)', 'MARs copy loaded',
      ]},
    ]
  },
  {
    id: 'destination', label: 'Destination', color: 'ops',
    groups: [
      { title: 'On Arrival', items: [
        'Contact TACC / C2 → LFA', 'Landing Fuel confirmed',
        'Refueling Load sent to FCCs', 'Debrief with FCCs',
        '781s, 791s, MARS, Dotsheet completed', 'Custom Forms (if req)',
        'Download Cargo / Pax', 'Secrets → CP', 'Guns → Lockbox / Armory',
        'Pickup U-Drive / Rental Car', 'Lodging Front Desk check-in',
        'Rally Plan executed', 'Commissary Run', 'Charge Status Puck',
      ]},
      { title: 'Schedule Transport', items: ['Schedule Trans arranged'] },
    ]
  },
  {
    id: 'next-leg', label: 'Next Leg', color: 'plan',
    groups: [
      { title: 'Rerun TDY Checklist', items: [
        'Rerun TDY Checklist (if req)', 'Hotel Receipt (Taxes?) obtained',
        'Schedule Trans arranged', 'Return U-Drive / Rental Car',
        'Pickup Guns / Secrets', 'Shoppette Run',
      ]},
    ]
  },
  {
    id: 'rtb', label: 'RTB', color: 'plan',
    groups: [
      { title: 'Return Actions', items: [
        'Download Cargo / Pax', 'MX Debrief completed',
        'Post Mission PPW (781, 791, MARs, etc)', 'PMCR completed (202v3 AMCSUP 3.1.10.)',
        'DTS Voucher submitted', 'Close MM Channel',
        'Return Stratus, TDY Kit, Guns, Secrets',
      ]},
    ]
  },
  {
    id: 'packing', label: 'Packing', color: 'pack',
    groups: [
      { title: 'Military Items', items: [
        'Uniforms (2–3x)', 'Boots', 'Belt', 'Cap', 'Socks — MIL (3–4x)',
        'Shirts (3–4x)', 'OCP Jacket', 'GTC card', 'Pro Gear',
        'Restricted Area Badge (RAB)', 'MOB Folder (WW)', 'Flightline DL',
        'Mil Concealed Carry License (523)', 'Laptop + Charger',
      ]},
      { title: 'Personal Items', items: [
        'GOV Passport', 'MOB Folders (WW)', 'Immunization Records',
        'Foreign Currency (notify bank)', 'In-flight CL, EFB + Charger',
      ]},
      { title: 'Civilian Clothes', items: [
        'Dress Clothes (2–3x)', 'Underwear (4–5x)', 'Socks — CIV (4–5x)',
        'Workout Clothes (3–4x)', 'Workout Towels (2–3x)',
        'Shoes (workout, casual, dress)', 'Swim Suit', 'Jacket / Coat',
        'Speaker', 'Cell Phone Charger', 'OFF / Sunblock', 'Plastic Bags',
        'Headphones', 'Toiletries', 'Neck Pillow', 'Playing Cards',
      ]},
      { title: 'Cold Weather', items: [
        'LRS B Bag', 'Beanie', 'Gloves', 'Winter Socks (3–4x)',
        'Thermal Underwear', 'Sweats',
      ]},
    ]
  },
  {
    id: 'grocery', label: 'Grocery', color: 'pack',
    groups: [
      { title: 'Check Lodging Amenities', items: ['Lodging has fridge & microwave confirmed'] },
      { title: 'Produce', items: [
        'Salad Mix', 'Carrots', 'Bananas', 'Apples', 'Oranges',
        'Blueberries / Strawberries', 'Avocado',
      ]},
      { title: 'Protein', items: ['Sandwich Meat', 'Eggs', 'Hummus'] },
      { title: 'Snacks & Pantry', items: [
        'Salsa', 'Chips', 'Bread', 'Peanut Butter', 'Oatmeal / Granola',
        'Protein Bars', 'Paper Plates', 'Sandwich Bags', 'Microwave Rice',
        'Jam / Jelly', 'Rice Cakes',
      ]},
      { title: 'Dairy & Drinks', items: [
        'Whole Milk', 'Freezer Meals', 'Sandwich Cheese',
        'Sandwich Condiments', 'Greek Yogurt',
      ]},
    ]
  },
];
 
let state = {}, notes = {};
 
function loadState() {
  try { state = JSON.parse(localStorage.getItem('tdy_state') || '{}'); } catch(e) { state = {}; }
  try { notes = JSON.parse(localStorage.getItem('tdy_notes') || '{}'); } catch(e) { notes = {}; }
}
function saveState() {
  localStorage.setItem('tdy_state', JSON.stringify(state));
  localStorage.setItem('tdy_notes', JSON.stringify(notes));
}
function itemKey(sId, gTitle, item) { return `${sId}||${gTitle}||${item}`; }
function getAllKeys() {
  const k = [];
  SECTIONS.forEach(s => s.groups.forEach(g => g.items.forEach(i => k.push(itemKey(s.id, g.title, i)))));
  return k;
}
 
function updateProgress() {
  const all = getAllKeys(), done = all.filter(k => state[k]).length;
  const pct = all.length ? Math.round(done / all.length * 100) : 0;
  document.getElementById('prog-label').textContent = `${done} of ${all.length} complete`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
 
  const planKeys = [];
  SECTIONS.forEach(s => s.groups.forEach(g => g.items.forEach(i => {
    if (['plan','ops','crit'].includes(s.color)) planKeys.push(itemKey(s.id, g.title, i));
  })));
  const planDone = planKeys.filter(k => state[k]).length;
 
  document.getElementById('phase-summary').innerHTML = `
    <div class="phase-stat">
      <div class="ps-num" style="color:var(--blue)">${planDone}/${planKeys.length}</div>
      <div class="ps-label">Ops Tasks</div>
    </div>
    <div class="phase-stat">
      <div class="ps-num" style="color:var(--green)">${done}/${all.length}</div>
      <div class="ps-label">Total Done</div>
    </div>
  `;
 
  SECTIONS.forEach(s => {
    const sKeys = [];
    s.groups.forEach(g => g.items.forEach(i => sKeys.push(itemKey(s.id, g.title, i))));
    const sDone = sKeys.filter(k => state[k]).length;
    const dot = document.querySelector(`[data-tab="${s.id}"] .tab-dot`);
    if (dot) dot.style.background = (sDone === sKeys.length && sKeys.length > 0) ? 'var(--green)' : '';
  });
}
 
function toggleItem(key, el) {
  state[key] = !state[key];
  saveState();
  el.classList.toggle('done', state[key]);
  updateProgress();
}
 
function resetAll() {
  if (!confirm('Reset all items and clear notes?')) return;
  state = {}; notes = {}; saveState();
  document.querySelectorAll('.check-item.done').forEach(el => el.classList.remove('done'));
  document.querySelectorAll('.item-notes').forEach(el => el.value = '');
  updateProgress();
}
 
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.dataset.section === id));
}
 
// ── SEARCH ──────────────────────────────────────────────────────────────
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function highlight(text, q) {
  return text.replace(new RegExp(`(${escRe(q)})`, 'gi'), '<mark class="search-highlight">$1</mark>');
}
 
function runSearch(query) {
  const q = query.trim().toLowerCase();
  const tabsNav = document.getElementById('tabs-nav');
  const label   = document.getElementById('search-results-label');
  const noRes   = document.getElementById('no-results');
  const clrBtn  = document.getElementById('search-clear');
 
  clrBtn.classList.toggle('visible', q.length > 0);
 
  if (!q) {
    tabsNav.classList.remove('search-active');
    label.classList.remove('visible');
    noRes.classList.remove('visible');
    document.querySelectorAll('.section').forEach(s => {
      s.classList.remove('search-active');
      s.style.display = '';
    });
    document.querySelectorAll('.check-item').forEach(el => {
      el.classList.remove('search-hidden');
      const lbl = el.querySelector('.item-label');
      if (lbl && lbl.dataset.original) lbl.innerHTML = lbl.dataset.original;
    });
    document.querySelectorAll('.group-header').forEach(el => el.classList.remove('search-hidden'));
    const active = document.querySelector('.tab.active');
    switchTab(active ? active.dataset.tab : SECTIONS[0].id);
    return;
  }
 
  tabsNav.classList.add('search-active');
  document.querySelectorAll('.section').forEach(s => {
    s.classList.remove('active');
    s.classList.add('search-active');
  });
 
  let total = 0;
  SECTIONS.forEach(s => {
    s.groups.forEach(g => {
      let gVis = 0;
      const gEl = document.querySelector(`[data-group="${s.id}||${g.title}"]`);
      document.querySelectorAll(`[data-group-items="${s.id}||${g.title}"] .check-item`).forEach(row => {
        const lbl = row.querySelector('.item-label');
        const orig = lbl.dataset.original || lbl.textContent;
        lbl.dataset.original = orig;
        if (orig.toLowerCase().includes(q)) {
          row.classList.remove('search-hidden');
          lbl.innerHTML = highlight(orig, query.trim());
          gVis++; total++;
        } else {
          row.classList.add('search-hidden');
          lbl.innerHTML = orig;
        }
      });
      if (gEl) gEl.classList.toggle('search-hidden', gVis === 0);
    });
  });
 
  document.querySelectorAll('.section').forEach(sec => {
    sec.style.display = sec.querySelectorAll('.check-item:not(.search-hidden)').length > 0 ? 'block' : 'none';
  });
 
  label.textContent = `${total} result${total !== 1 ? 's' : ''} for "${query.trim()}"`;
  label.classList.add('visible');
  noRes.classList.toggle('visible', total === 0);
}
 
function initSearch() {
  const inp = document.getElementById('search-input');
  const clr = document.getElementById('search-clear');
  inp.addEventListener('input', e => runSearch(e.target.value));
  clr.addEventListener('click', () => { inp.value = ''; runSearch(''); inp.focus(); });
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); });
}
 
// ── BUILD ────────────────────────────────────────────────────────────────
function build() {
  loadState();
  const tabsNav = document.getElementById('tabs-nav');
  const wrap    = document.getElementById('sections-wrap');
 
  SECTIONS.forEach((s, si) => {
    const tab = document.createElement('button');
    tab.className = 'tab' + (si === 0 ? ' active' : '');
    tab.dataset.tab = s.id;
    tab.innerHTML = `<span class="tab-dot"></span>${s.label}`;
    tab.addEventListener('click', () => switchTab(s.id));
    tabsNav.appendChild(tab);
 
    const section = document.createElement('div');
    section.className = 'section' + (si === 0 ? ' active' : '');
    section.dataset.section = s.id;
 
    const secLbl = document.createElement('div');
    secLbl.className = 'section-search-label';
    secLbl.textContent = s.label;
    section.appendChild(secLbl);
 
    s.groups.forEach(g => {
      const gh = document.createElement('div');
      gh.className = 'group-header';
      gh.textContent = g.title;
      gh.dataset.group = `${s.id}||${g.title}`;
      section.appendChild(gh);
 
      const cl = document.createElement('div');
      cl.className = 'checklist';
      cl.dataset.groupItems = `${s.id}||${g.title}`;
 
      g.items.forEach(item => {
        const key = itemKey(s.id, g.title, item);
        const row = document.createElement('div');
        row.className = `check-item accent-${s.color}` + (state[key] ? ' done' : '');
 
        const hasNotes = s.id !== 'packing' && s.id !== 'grocery';
        const noteVal  = notes[key] || '';
        const noteHtml = hasNotes
          ? `<input type="text" class="item-notes" placeholder="Notes…" value="${noteVal.replace(/"/g,'&quot;')}">`
          : '';
 
        row.innerHTML = `
          <div class="checkbox">
            <svg class="checkmark" viewBox="0 0 13 10">
              <path d="M1.5 5l3.5 3.5 6.5-7"/>
            </svg>
          </div>
          <div class="item-content">
            <span class="item-label">${item}</span>
            ${noteHtml}
          </div>
        `;
 
        row.addEventListener('click', e => {
          if (e.target.classList.contains('item-notes')) return;
          toggleItem(key, row);
        });
 
        if (hasNotes) {
          row.querySelector('.item-notes').addEventListener('input', e => {
            notes[key] = e.target.value;
            saveState();
          });
        }
 
        cl.appendChild(row);
      });
 
      section.appendChild(cl);
    });
 
    wrap.appendChild(section);
  });
 
  updateProgress();
  initSearch();
}
 
build();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AF TDY Checklist">
<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" sizes="180x180" href="./icon.png?v=3">
<link rel="icon" type="image/png" sizes="192x192" href="./icon.png?v=3">
<link rel="icon" type="image/png" sizes="512x512" href="./icon.png?v=3">
<link rel="shortcut icon" href="./icon.png?v=3">

<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<title>Air Force TDY Checklist</title>
<style>
  :root {
    --accent:        #1eb4f0;
    --accent-dim:    rgba(30, 180, 240, 0.18);
    --accent-border: rgba(30, 180, 240, 0.45);
    --accent-glow:   rgba(30, 180, 240, 0.6);
    --red:           #fa5252;
 
    --bg:          #000000;
    --surface:     #101010;
    --surface2:    #1a1a1a;
    --border:      #2a2a2a;
    --border-hi:   #3a3a3a;
    --text:        #f0f0f0;
    --muted:       #888888;
    --done-text:   #444444;
 
    --radius: 10px;
    --radius-sm: 6px;
  }
  
  body.light-mode {
    --bg:          #ffffff;
    --surface:     #ffffff;
    --surface2:    #f4f5f7;
    --border:      #000000; 
    --border-hi:   #000000; 
    --text:        #000000; 
    --muted:       #555555;
    --done-text:   #888888;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
    min-height: 100vh;
    padding-bottom: 110px;
    transition: background-color 0.2s, color 0.2s;
  }
 
  /* ── HEADER ─────────────────────────────────────── */
  .header {
    background: var(--surface);
    border-bottom: 1.5px solid var(--accent-border);
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    transition: background-color 0.2s, border-color 0.2s;
  }
  .header-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 10px;
  }
  .header-title-wrap {
    display: flex; flex-direction: column; gap: 6px;
  }
  .header h1 {
    font-size: 21px; font-weight: 800;
    letter-spacing: 0.3px;
    color: var(--accent);
    line-height: 1.1;
    width: fit-content;
  }
  .header-sub-row {
    display: flex; align-items: center; gap: 12px;
  }
  .cao-box {
    display: inline-block;
    font-size: 10px; font-weight: 800;
    letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border-hi);
    padding: 2px 6px; border-radius: 4px;
    width: fit-content;
    transition: all 0.2s;
  }
  
  .theme-picker {
    display: flex; gap: 6px; align-items: center;
  }
  
  .color-picker-input {
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    border: none;
    background: transparent;
    cursor: pointer;
    padding: 0;
    transition: transform 0.15s;
  }
  .color-picker-input::-webkit-color-swatch-wrapper { padding: 0; }
  .color-picker-input::-webkit-color-swatch { border: 1.5px solid var(--border-hi); border-radius: 50%; }
  .color-picker-input::-moz-color-swatch { border: 1.5px solid var(--border-hi); border-radius: 50%; }
  .color-picker-input:active { transform: scale(0.9); }

  .theme-dot {
    width: 14px; height: 14px; border-radius: 50%;
    cursor: pointer; border: 1.5px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }
  .theme-dot.active { border-color: var(--text); transform: scale(1.15); }
  
  .theme-sep { width: 1px; height: 16px; background: var(--border-hi); margin: 0 4px; }
  .bg-dot { border: 1.5px solid var(--border-hi); width: 18px; height: 18px; }
  
  .reset-btn {
    background: none;
    border: 1px solid var(--border-hi);
    color: var(--muted);
    font-size: 12px; font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer; font-family: inherit;
    text-transform: uppercase; letter-spacing: 0.4px;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .reset-btn:active { opacity: 0.5; }
 
  /* ── EDIT MODE UI ────────────────────────────────── */
  .delete-btn {
    display: none;
    background: none; border: none;
    color: var(--red); font-size: 14px; font-weight: bold;
    cursor: pointer; padding: 2px 6px;
    border-radius: 4px;
    margin-left: auto;
  }
  .delete-btn:active { opacity: 0.5; }
  
  .add-btn {
    display: none;
    background: var(--surface2); border: 1px dashed var(--border-hi);
    color: var(--muted); font-size: 12px; font-weight: 600;
    cursor: pointer; padding: 6px 12px;
    border-radius: var(--radius-sm); width: 100%; margin-top: 6px;
    text-transform: uppercase; letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  
  body.edit-mode .delete-btn { display: inline-block; }
  body.edit-mode .add-btn { display: block; }
  
  body.edit-mode .editable-text {
    pointer-events: auto;
    border-bottom: 1px dashed var(--border-hi);
  }
  body.edit-mode .editable-text:hover, 
  body.edit-mode .editable-text:focus {
    border-bottom-color: var(--accent);
  }
  body.edit-mode .tab.active .editable-text { border-bottom-color: var(--accent); }
  
  body.edit-mode .check-item .checkbox,
  body.edit-mode .check-item .item-notes { pointer-events: none; opacity: 0.3; }

  /* ── SEARCH ──────────────────────────────────────── */
  .search-wrap { position: relative; margin-bottom: 10px; }
  .search-icon {
    position: absolute; left: 11px; top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    color: var(--muted); pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 9px 34px 9px 36px;
    border: 1px solid var(--border-hi);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    font-size: 16px; font-family: inherit;
    outline: none;
    transition: border-color 0.15s, background-color 0.2s, color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  .search-clear {
    position: absolute; right: 9px; top: 50%;
    transform: translateY(-50%);
    background: var(--muted); border: none;
    border-radius: 50%; width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0;
    opacity: 0; transition: opacity 0.15s; pointer-events: none;
  }
  .search-clear.visible { opacity: 1; pointer-events: auto; }
  .search-clear svg { width: 10px; height: 10px; color: white; }
 
  /* ── PROGRESS ────────────────────────────────────── */
  .progress-stats {
    display: flex; justify-content: space-between;
    font-size: 12px; font-weight: 600;
    color: var(--muted); margin-bottom: 5px;
  }
  .progress-track { background: var(--border); border-radius: 4px; height: 5px; overflow: hidden; transition: background-color 0.2s; }
  .progress-fill {
    height: 100%; background: var(--accent); border-radius: 4px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1), background-color 0.3s;
    box-shadow: 0 0 8px var(--accent-glow);
  }
 
  /* ── SEARCH LABEL / NO RESULTS ───────────────────── */
  .search-results-label {
    display: none; font-size: 12px; font-weight: 600;
    color: var(--muted); padding: 8px 16px 0;
  }
  .search-results-label.visible { display: block; }
  .no-results {
    display: none; text-align: center;
    padding: 40px 20px; color: var(--muted); font-size: 15px;
  }
  .no-results.visible { display: block; }
 
  /* ── TABS ────────────────────────────────────────── */
  .tabs {
    display: flex; overflow-x: auto; gap: 7px;
    padding: 10px 16px 0;
    scrollbar-width: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    transition: background-color 0.2s, border-color 0.2s;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tabs.search-active { display: none; }
  .tab {
    flex-shrink: 0;
    border: 1px solid var(--border-hi);
    background: var(--surface2);
    color: var(--muted);
    font-size: 13px; font-weight: 600;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer; font-family: inherit;
    transition: all 0.12s;
    white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
  }
  .tab-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--border-hi); transition: background 0.2s; flex-shrink: 0;
  }
  .tab.active {
    border-color: var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
  }
  .tab.active .tab-dot { background: var(--accent); }
  
  /* ── SECTION ─────────────────────────────────────── */
  .section { display: none; padding: 12px 16px 0; }
  .section.active { display: block; }
  .section.search-active { display: block !important; }
 
  .section-search-label {
    display: none;
    font-size: 11px; font-weight: 800;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--accent); border: 1px solid var(--accent-border);
    padding: 2px 10px; border-radius: 4px;
    margin-bottom: 6px; width: fit-content;
  }
  .section.search-active .section-search-label { display: inline-block; }
 
  /* ── GROUP HEADER ────────────────────────────────── */
  .group-header {
    font-size: 11px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted);
    padding: 14px 0 6px;
    display: flex; align-items: center; gap: 10px;
  }
  .group-header::after { content: ''; flex: 1; height: 1px; background: var(--border); transition: background-color 0.2s; }
  .group-header.search-hidden { display: none !important; }
 
  /* ── EDITABLE TEXT ───────────────────────────────── */
  .editable-text {
    outline: none;
    border-bottom: 1px dashed transparent;
    transition: border-bottom-color 0.2s, color 0.2s;
    cursor: text;
    padding-bottom: 1px;
    pointer-events: none;
  }
 
  /* ── CHECKLIST ───────────────────────────────────── */
  .checklist { display: flex; flex-direction: column; gap: 3px; }
  .check-item.search-hidden { display: none !important; }
 
  .check-item {
    display: flex; align-items: center; gap: 13px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent-border);
    border-radius: var(--radius-sm);
    padding: 13px 14px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
    user-select: none;
    min-height: 52px;
  }
  .check-item:active { background: var(--surface2); }
  .check-item.done {
    border-left-color: var(--border);
    opacity: 0.45;
  }
  .check-item.done .item-label {
    text-decoration: line-through;
    color: var(--done-text);
  }
  
  body.edit-mode .check-item.done .item-label { text-decoration: none; color: var(--text); }
 
  /* ── CHECKBOX ────────────────────────────────────── */
  .checkbox {
    width: 24px; height: 24px; flex-shrink: 0;
    border: 1.5px solid var(--border-hi);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    background: var(--surface2);
  }
  .check-item.done .checkbox {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
  }
  .checkmark { display: none; width: 11px; height: 8px; }
  .checkmark path { stroke: #000; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .check-item.done .checkmark { display: block; }
 
  /* ── ITEM TEXT ───────────────────────────────────── */
  .item-content { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .item-label { font-size: 16px; font-weight: 500; line-height: 1.35; color: var(--text); transition: color 0.2s; }
 
  /* ── NOTES ───────────────────────────────────────── */
  .item-notes {
    font-size: 14px;
    padding: 7px 10px;
    border: 1px solid var(--border-hi);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    font-family: inherit; 
    width: 100%; 
    outline: none;
    transition: border-color 0.15s, background-color 0.2s, color 0.2s;
    resize: none; 
    overflow: hidden; 
    line-height: 1.4;
  }
  .item-notes:focus { border-color: var(--accent); }
  .item-notes::placeholder { color: var(--muted); }
  .check-item.done .item-notes { opacity: 0.4; }
 
  /* ── BOTTOM BAR ──────────────────────────────────── */
  .phase-summary {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1.5px solid var(--accent-border);
    padding: 10px 20px 26px;
    display: flex; justify-content: space-between;
    align-items: center; gap: 20px;
    transition: background-color 0.2s, border-color 0.2s;
  }
  .phase-stat { text-align: left; flex-shrink: 0; }
  .phase-stat .ps-num { font-size: 22px; font-weight: 800; color: var(--accent); }
  .phase-stat .ps-label {
    font-size: 10px; font-weight: 700;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.8px; margin-top: 2px;
  }

  /* ── TIME CALC BOTTOM BUTTON ─────────────────────── */
  .tc-bottom-btn {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    border: 1.5px solid var(--accent-border);
    color: var(--accent);
    font-size: 11px; font-weight: 700;
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer; font-family: inherit;
    text-transform: uppercase; letter-spacing: 0.6px;
    transition: all 0.2s;
    line-height: 1.2;
    gap: 3px;
    text-align: center;
    width: 150px;
  }
  .tc-bottom-btn .tc-icon {
    font-size: 17px;
    line-height: 1;
  }
  .tc-bottom-btn:active { opacity: 0.6; transform: scale(0.97); }
  .tc-bottom-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    color: var(--accent);
  }
  
  .edit-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .edit-toggle-btn {
    background: var(--surface2);
    border: 1px solid var(--border-hi);
    color: var(--text);
    font-size: 12px; font-weight: 600;
    padding: 7px 12px;
    border-radius: 20px;
    cursor: pointer; font-family: inherit;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .edit-toggle-btn.active {
    background: var(--accent-dim);
    color: var(--accent);
    border-color: var(--accent);
  }
  
  .restore-btn {
    display: none;
    background: transparent;
    border: 1px solid var(--border-hi);
    color: var(--red);
    font-size: 10px; font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    cursor: pointer; font-family: inherit;
    transition: all 0.2s;
    white-space: nowrap;
  }
  body.edit-mode .restore-btn { display: block; }
  
  /* ── TIME CALCULATOR STYLES ──────────────────────── */
  .tc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 20px;
  }
  .tc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .tc-row-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px; }
  
  .tc-label { display: block; color: var(--muted); font-size: 12px; font-weight: 600; margin-bottom: 6px; }
  .tc-input, .tc-select {
    width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border-hi); 
    background: var(--surface2); color: var(--text); font-family: inherit; font-size: 15px; 
    outline: none; transition: border-color 0.15s;
  }
  .tc-input:focus, .tc-select:focus { border-color: var(--accent); }
  
  .tc-input.error, .tc-select.error { border-color: var(--red) !important; box-shadow: 0 0 0 2px rgba(250,82,82,0.18) inset; }
  .tc-input.ok, .tc-select.ok { border-color: var(--accent) !important; }
  
  .tc-btn {
    background: var(--surface2); border: 1px solid var(--border-hi); color: var(--text); 
    padding: 10px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .tc-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
  .tc-btn.bad { border-color: var(--red) !important; box-shadow: 0 0 8px rgba(250, 82, 82, 0.5); }
  
  .tc-section-title { font-weight: 700; font-size: 14px; margin: 16px 0 10px; color: var(--text); text-transform: uppercase; letter-spacing: 0.5px; }
  
  .tc-timeline { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; margin-bottom: 20px; }
  .tc-line { display: flex; justify-content: space-between; align-items: center; padding: 8px 6px; border-bottom: 1px dashed var(--border-hi); }
  .tc-line:last-child { border-bottom: none; }
  .tc-name { font-size: 14px; color: var(--text); font-weight: 500; }
  .tc-time { font-family: ui-monospace, Menlo, Consolas, monospace; font-weight: 600; font-size: 14px; color: var(--text); }
  .tc-hint { color: var(--muted); font-size: 11px; margin-left: 6px; font-weight: normal; }
  
  .tc-notice { display: none; font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 20px; margin-bottom: 10px; }
  .tc-notice.warn { display: inline-flex; background: rgba(250, 204, 21, 0.2); color: #facc15; border: 1px solid rgba(250, 204, 21, 0.5); }
  .tc-notice.bad { display: inline-flex; background: rgba(239, 68, 68, 0.2); color: var(--red); border: 1px solid rgba(239, 68, 68, 0.5); }
  
  .tc-nowbox { background: var(--surface2); border: 1px solid var(--border-hi); border-radius: var(--radius-sm); padding: 10px; font-family: ui-monospace, Menlo, monospace; font-size: 13px; color: var(--accent); text-align: center; }
  
  .tc-action-bar { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; margin-bottom: 30px; }
  .tc-primary-btn { background: var(--surface2); border: 1px solid var(--border-hi); color: var(--text); font-weight: 600; padding: 12px; border-radius: var(--radius-sm); text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
  .tc-primary-btn.ready { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
  .tc-primary-btn.needs-run { box-shadow: 0 0 0 2px #facc15 inset; }
  
  .tc-copy-btn { width: auto; padding: 6px 12px; border-radius: 20px; background: var(--surface2); color: var(--text); border: 1px solid var(--border-hi); font-size: 12px; font-weight: 600; cursor: pointer; }
  .tc-copy-btn:not(:disabled):hover { background: var(--accent); color: #000; border-color: var(--accent); }
  
  .tc-tiny { font-size: 11px; color: var(--muted); margin-top: 4px; }
</style>
</head>
<body>
 
<div class="header">
  <div class="header-top">
    <div class="header-title-wrap">
      <h1 class="editable-text" contenteditable="false" spellcheck="false" id="main-title">Air Force TDY Checklist</h1>
      <div class="header-sub-row">
        <div class="cao-box">CAO: <span id="cao-date"></span></div>
        <div class="theme-picker" id="theme-picker">
          <input type="color" id="custom-color-picker" class="color-picker-input" value="#1eb4f0" title="Choose Accent Color">
          <div class="theme-sep"></div>
          <div class="theme-dot bg-dot" style="background: #000000;" data-bg="dark" onclick="setBgMode('dark')"></div>
          <div class="theme-dot bg-dot" style="background: #ffffff;" data-bg="light" onclick="setBgMode('light')"></div>
        </div>
      </div>
    </div>
    <button class="reset-btn" onclick="resetAll()">Reset</button>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="8.5" cy="8.5" r="5.5"/><path d="M15 15l-3-3"/>
    </svg>
    <input type="search" class="search-input" id="search-input"
      placeholder="Search checklist…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="search-clear" id="search-clear" aria-label="Clear search">
      <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M2 2l6 6M8 2l-6 6"/>
      </svg>
    </button>
  </div>
  <div class="progress-stats">
    <span id="prog-label">0 of 0 complete</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>
 
<div class="tabs" id="tabs-nav"></div>
 
<div class="search-results-label" id="search-results-label"></div>
<div class="no-results" id="no-results">No items match your search.</div>
 
<div id="sections-wrap"></div>

<div id="tc-wrap" style="display:none; padding: 16px;">
  <div class="tc-card">
    <div class="tc-row">
       <button id="tc-basic" class="tc-btn active">Basic</button>
       <button id="tc-aug" class="tc-btn">Augmented</button>
    </div>
    <div class="tc-row" style="margin-bottom: 20px;">

function hexToRgb(hex) {
  var shorthandRegex = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
  hex = hex.replace(shorthandRegex, function(m, r, g, b) { return r + r + g + g + b + b; });
  var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
}

function applyCustomColor(hex) {
  const rgb = hexToRgb(hex);
  if (!rgb) return;
  const { r, g, b } = rgb;
  document.documentElement.style.setProperty('--accent', hex);
  document.documentElement.style.setProperty('--accent-dim', `rgba(${r}, ${g}, ${b}, 0.18)`);
  document.documentElement.style.setProperty('--accent-border', `rgba(${r}, ${g}, ${b}, 0.45)`);
  document.documentElement.style.setProperty('--accent-glow', `rgba(${r}, ${g}, ${b}, 0.6)`);
  localStorage.setItem('tdy2_theme_color', hex);
  const picker = document.getElementById('custom-color-picker');
  if (picker && picker.value !== hex) picker.value = hex;
}

document.getElementById('custom-color-picker').addEventListener('input', (e) => {
  applyCustomColor(e.target.value);
});

function setBgMode(mode) {
  if (mode === 'light') {
    document.body.classList.add('light-mode');
  } else {
    document.body.classList.remove('light-mode');
  }
  localStorage.setItem('tdy2_bg', mode);
  document.querySelectorAll('.bg-dot').forEach(el => el.classList.remove('active'));
  const activeDot = document.querySelector(`.bg-dot[data-bg="${mode}"]`);
  if(activeDot) activeDot.classList.add('active');
}
 
let state = {}, notes = {}, SECTIONS = [];
let activeTabId = null;
let isEditMode = false;
 
function loadState() {
  try { state = JSON.parse(localStorage.getItem('tdy2_state') || '{}'); } catch(e) { state = {}; }
  try { notes = JSON.parse(localStorage.getItem('tdy2_notes') || '{}'); } catch(e) { notes = {}; }
  try { 
    const savedSec = localStorage.getItem('tdy2_sections');
    SECTIONS = savedSec ? JSON.parse(savedSec) : JSON.parse(JSON.stringify(DEFAULT_SECTIONS)); 
  } catch(e) { SECTIONS = JSON.parse(JSON.stringify(DEFAULT_SECTIONS)); }
  
  const savedTitle = localStorage.getItem('tdy2_title');
  if (savedTitle) document.getElementById('main-title').textContent = savedTitle;

  const savedColor = localStorage.getItem('tdy2_theme_color') || '#1eb4f0';
  applyCustomColor(savedColor);
  
  const savedBg = localStorage.getItem('tdy2_bg') || 'dark';
  setBgMode(savedBg);
}
function saveState() {
  localStorage.setItem('tdy2_state', JSON.stringify(state));
  localStorage.setItem('tdy2_notes', JSON.stringify(notes));
}
function saveSections() {
  localStorage.setItem('tdy2_sections', JSON.stringify(SECTIONS));
}

function toggleEditMode() {
  isEditMode = !isEditMode;
  document.body.classList.toggle('edit-mode', isEditMode);
  
  const btn = document.getElementById('edit-mode-btn');
  btn.textContent = isEditMode ? 'Done Editing' : 'Edit Checklist';
  btn.classList.toggle('active', isEditMode);
  
  document.querySelectorAll('.editable-text').forEach(el => {
      el.contentEditable = isEditMode ? "true" : "false";
  });
  
  document.querySelectorAll('.add-sec-tab').forEach(el => {
      el.style.display = isEditMode ? 'flex' : 'none';
  });
}

function restoreDefaults() {
  if (!confirm('Restore default categories and items? This will replace your custom checklist structure.')) return;

const titleEl = document.getElementById('main-title');
titleEl.addEventListener('blur', e => {

   if (newTitle) {

   } else {
       e.target.textContent = 'Air Force TDY Checklist';

   }

   if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); }

function itemKey(sId, gTitle, item) { return `${sId}||${gTitle}||${item}`; }
function getAllKeys() {
  const k = [];
  SECTIONS.forEach(s => s.groups.forEach(g => g.items.forEach(i => k.push(itemKey(s.id, g.title, i)))));
  return k;
}
 
function updateProgress() {
  const all = getAllKeys(), done = all.filter(k => state[k]).length;
  const pct = all.length ? Math.round(done / all.length * 100) : 0;
  document.getElementById('prog-label').textContent = `${done} of ${all.length} complete`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
 
  document.getElementById('phase-summary-stats').innerHTML = `
      <div class="ps-num">${done}/${all.length}</div>
      <div class="ps-label">Total Done</div>
  `;
 
  SECTIONS.forEach(s => {
    const sKeys = [];
    s.groups.forEach(g => g.items.forEach(i => sKeys.push(itemKey(s.id, g.title, i))));
    const sDone = sKeys.filter(k => state[k]).length;
    const dot = document.querySelector(`[data-tab="${s.id}"] .tab-dot`);
    if (dot) dot.style.background = (sDone === sKeys.length && sKeys.length > 0) ? 'var(--accent)' : '';
  });
}
 
function toggleItem(key, el) {
  if (isEditMode) return; 
  state[key] = !state[key]; saveState();
  el.classList.toggle('done', state[key]);
  updateProgress();
}
 
function resetAll() {

function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function highlight(text, q) {
  return text.replace(new RegExp(`(${escRe(q)})`, 'gi'), '<mark class="search-highlight">$1</mark>');
}
 
function runSearch(query) {
  const q = query.trim().toLowerCase();
  const tabsNav = document.getElementById('tabs-nav');
  const label   = document.getElementById('search-results-label');
  const noRes   = document.getElementById('no-results');
  const clrBtn  = document.getElementById('search-clear');
 
  clrBtn.classList.toggle('visible', q.length > 0);
 
  if (!q) {
    tabsNav.classList.remove('search-active');
    label.classList.remove('visible');
    noRes.classList.remove('visible');
    document.querySelectorAll('.section').forEach(s => {
      s.classList.remove('search-active'); s.style.display = '';
    });
    document.querySelectorAll('.check-item').forEach(el => {
      el.classList.remove('search-hidden');
      const lbl = el.querySelector('.item-label');
      if (lbl && lbl.dataset.original) lbl.innerHTML = lbl.dataset.original;
    });
    document.querySelectorAll('.group-header').forEach(el => el.classList.remove('search-hidden'));
    switchTab(activeTabId || (SECTIONS.length ? SECTIONS[0].id : null));
    return;
  }
 
  tabsNav.classList.add('search-active');
  document.querySelectorAll('.section').forEach(s => {
    s.classList.remove('active'); s.classList.add('search-active');
  });
 
  let total = 0;
  SECTIONS.forEach(s => {
    s.groups.forEach(g => {
      let gVis = 0;
      const gEl = document.querySelector(`[data-group="${s.id}||${g.title}"]`);
      document.querySelectorAll(`[data-group-items="${s.id}||${g.title}"] .check-item`).forEach(row => {
        const lbl = row.querySelector('.item-label');
        const orig = lbl.dataset.original || lbl.textContent;
        lbl.dataset.original = orig;
        if (orig.toLowerCase().includes(q)) {
          row.classList.remove('search-hidden');
          lbl.innerHTML = highlight(orig, query.trim());
          gVis++; total++;
        } else {
          row.classList.add('search-hidden');
          lbl.innerHTML = orig;
        }
      });
      if (gEl) gEl.classList.toggle('search-hidden', gVis === 0);
    });
  });
 
  document.querySelectorAll('.section').forEach(sec => {
    sec.style.display = sec.querySelectorAll('.check-item:not(.search-hidden)').length > 0 ? 'block' : 'none';
  });
 
  label.textContent = `${total} result${total !== 1 ? 's' : ''} for "${query.trim()}"`;
  label.classList.add('visible');
  noRes.classList.toggle('visible', total === 0);
}
 
function initSearch() {
  const inp = document.getElementById('search-input');
  const clr = document.getElementById('search-clear');
  inp.addEventListener('input', e => runSearch(e.target.value));
  clr.addEventListener('click', () => { inp.value = ''; runSearch(''); inp.focus(); });
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); });
}
 
function build() {
  loadState();
  const tabsNav = document.getElementById('tabs-nav');
  const wrap    = document.getElementById('sections-wrap');
  
  tabsNav.innerHTML = '';
  wrap.innerHTML = '';
  
  if (!activeTabId && SECTIONS.length > 0) activeTabId = SECTIONS[0].id;

  SECTIONS.forEach((s, sIndex) => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (s.id === activeTabId ? ' active' : '');
    tab.dataset.tab = s.id;
    tab.innerHTML = `<span class="tab-dot"></span>`;
    
    const tabText = document.createElement('span');
    tabText.className = 'editable-text';
    tabText.contentEditable = isEditMode ? "true" : "false";
    tabText.spellcheck = false;
    tabText.textContent = s.label;
    
    tabText.addEventListener('blur', (e) => {
      const newLabel = e.target.textContent.trim();
      if (newLabel && newLabel !== s.label) {
        s.label = newLabel;
        saveSections();
        const secLbl = document.querySelector(`.section[data-section="${s.id}"] .section-search-label`);
        if (secLbl) secLbl.textContent = newLabel;
      } else {
        e.target.textContent = s.label; 
      }
    });
    tabText.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); }
    });

    const delSecBtn = document.createElement('button');
    delSecBtn.className = 'delete-btn';
    delSecBtn.innerHTML = '✖';
    delSecBtn.onclick = (e) => { e.stopPropagation(); deleteSection(sIndex); };

    tab.appendChild(tabText);
    tab.appendChild(delSecBtn);
    
    tab.addEventListener('click', (e) => {
      if (e.target !== tabText && e.target !== delSecBtn) switchTab(s.id);
    });
    tabsNav.appendChild(tab);
 
    const section = document.createElement('div');
    section.className = 'section' + (s.id === activeTabId ? ' active' : '');
    section.dataset.section = s.id;
 
    const secLbl = document.createElement('div');
    secLbl.className = 'section-search-label';
    secLbl.textContent = s.label;
    section.appendChild(secLbl);
 
    s.groups.forEach((g, gIndex) => {
      const gh = document.createElement('div');
      gh.className = 'group-header';
      gh.dataset.group = `${s.id}||${g.title}`;
      
      const ghText = document.createElement('span');
      ghText.className = 'editable-text';
      ghText.contentEditable = isEditMode ? "true" : "false";
      ghText.spellcheck = false;
      ghText.textContent = g.title;
      
      ghText.addEventListener('blur', (e) => {
        const newTitle = e.target.textContent.trim();
        if (newTitle && newTitle !== g.title) {
          const oldTitle = g.title;
          g.items.forEach(item => {
            const oldKey = itemKey(s.id, oldTitle, item);
            const newKey = itemKey(s.id, newTitle, item);
            if (state[oldKey] !== undefined) { state[newKey] = state[oldKey]; delete state[oldKey]; }
            if (notes[oldKey] !== undefined) { notes[newKey] = notes[oldKey]; delete notes[oldKey]; }
          });
          g.title = newTitle;
          saveState(); saveSections(); build(); 
        } else { e.target.textContent = g.title; }
      });
      ghText.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); } });
      
      const delGroupBtn = document.createElement('button');
      delGroupBtn.className = 'delete-btn';
      delGroupBtn.innerHTML = '✖';
      delGroupBtn.onclick = () => deleteGroup(sIndex, gIndex);
      
      gh.appendChild(ghText);
      gh.appendChild(delGroupBtn);
      section.appendChild(gh);
 
      const cl = document.createElement('div');
      cl.className = 'checklist';
      cl.dataset.groupItems = `${s.id}||${g.title}`;
 
      g.items.forEach((item, iIndex) => {
        const key = itemKey(s.id, g.title, item);
        const row = document.createElement('div');
        row.className = 'check-item' + (state[key] ? ' done' : '');
 
        const noteVal = notes[key] || '';
        const noteHtml = `<textarea class="item-notes" placeholder="Notes…" rows="1">${noteVal.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>`;
        
        const editableAttr = isEditMode ? 'contenteditable="true"' : 'contenteditable="false"';

        row.innerHTML = `
          <div class="checkbox">
            <svg class="checkmark" viewBox="0 0 11 8">
              <path d="M1 4l3 3 6-6"/>
            </svg>
          </div>
          <div class="item-content">
            <span class="item-label editable-text" ${editableAttr} spellcheck="false">${item}</span>
            ${noteHtml}
          </div>
          <button class="delete-btn" onclick="deleteItem(${sIndex}, ${gIndex}, ${iIndex})">✖</button>
        `;
        
        const labelEl = row.querySelector('.item-label');
        labelEl.addEventListener('blur', (e) => {
          const newItem = e.target.textContent.trim();
          if (newItem && newItem !== item) {
            const oldKey = itemKey(s.id, g.title, item);
            const newKey = itemKey(s.id, g.title, newItem);
            if (state[oldKey] !== undefined) { state[newKey] = state[oldKey]; delete state[oldKey]; }
            if (notes[oldKey] !== undefined) { notes[newKey] = notes[oldKey]; delete notes[oldKey]; }
            SECTIONS[sIndex].groups[gIndex].items[iIndex] = newItem;
            saveState(); saveSections(); build();
          } else {
            e.target.textContent = item;
          }
        });
        labelEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); } });
 
        row.addEventListener('click', e => {
          if (e.target.classList.contains('item-notes') || e.target.classList.contains('editable-text') || e.target.classList.contains('delete-btn')) return;
          toggleItem(key, row);
        });
        
        const notesInput = row.querySelector('.item-notes');
        notesInput.addEventListener('input', e => {
          notes[key] = e.target.value; 
          saveState();
          e.target.style.height = 'auto';
          e.target.style.height = e.target.scrollHeight + 'px';
        });
        
        if (noteVal) {
          setTimeout(() => {
            notesInput.style.height = 'auto';
            notesInput.style.height = notesInput.scrollHeight + 'px';
          }, 0);
        }
 
        cl.appendChild(row);
      });
      
      const addItemBtn = document.createElement('button');
      addItemBtn.className = 'add-btn';
      addItemBtn.textContent = '+ Add Item';
      addItemBtn.onclick = () => addItem(sIndex, gIndex);
      cl.appendChild(addItemBtn);
 
      section.appendChild(cl);
    });
    
    const addGroupBtn = document.createElement('button');
    addGroupBtn.className = 'add-btn';
    addGroupBtn.textContent = '+ Add Category';
    addGroupBtn.style.marginTop = '20px';
    addGroupBtn.onclick = () => addGroup(sIndex);
    section.appendChild(addGroupBtn);
 
    wrap.appendChild(section);
  });
  
  
  const addSecTab = document.createElement('div');
  addSecTab.className = 'tab';
  addSecTab.style.display = isEditMode ? 'flex' : 'none'; 
  addSecTab.classList.add('add-sec-tab');
  addSecTab.innerHTML = `<span style="font-size: 16px; font-weight: 800; line-height: 1;">+</span>`;
  addSecTab.onclick = addSection;
  tabsNav.appendChild(addSecTab);
 
  updateProgress();
  updateTcBottomBtn(activeTabId);

  if (!document.getElementById('search-input').dataset.initialized) {
     initSearch();
     document.getElementById('search-input').dataset.initialized = 'true';
  }
}
 
const originalToggleEditMode = toggleEditMode;
toggleEditMode = function() {
    originalToggleEditMode();
    document.querySelectorAll('.add-sec-tab').forEach(el => el.style.display = isEditMode ? 'flex' : 'none');
}

build();

// ── TIME CALCULATOR LOGIC ─────────────────────────────────────────────────────
function initTimeCalc() {
  const tc$ = (id) => document.getElementById(id);

  const dateEl = tc$('tc-date'), toEl = tc$('tc-to'), durEl = tc$('tc-dur');
  const tzDepEl = tc$('tc-tzDep'), tzArrEl = tc$('tc-tzArr');
  const offShowEl = tc$('tc-off-show'), offBriefEl = tc$('tc-off-brief'), offStepEl = tc$('tc-off-step'), offEngEl = tc$('tc-off-eng');
  const basicBtn = tc$('tc-basic'), augBtn = tc$('tc-aug'), singleBtn = tc$('tc-single'), formBtn = tc$('tc-form');
  const out = tc$('tc-timeline'), calcBtn = tc$('tc-calc'), resetBtn = tc$('tc-reset');
  const nowPanel = tc$('tc-nowPanel'), copyBtn = tc$('tc-copy');
  let lastCopyText = '';

  const DEFAULTS_KEY = 'kc135.defaults.v2';
  const SC = (obj) => JSON.parse(JSON.stringify(obj));
  const ZERO_DEFAULTS = { enabled: false, single: { show: 0, brief: 0, step: 0, eng: 0 }, formation:{ show: 0, brief: 0, step: 0, eng: 0 } };

  const el = {
    modal: tc$('tc-defaultsModal'), btn: tc$('tc-defaultsBtn'), save: tc$('tc-defaultsSave'), cancel: tc$('tc-defaultsCancel'), reset: tc$('tc-defaultsReset'),
    d_single_show: tc$('d_single_show'), d_single_brief: tc$('d_single_brief'), d_single_step: tc$('d_single_step'), d_single_eng: tc$('d_single_eng'),
    d_form_show: tc$('d_form_show'), d_form_brief: tc$('d_form_brief'), d_form_step: tc$('d_form_step'), d_form_eng: tc$('d_form_eng'),
  };

  function loadDefaults(){ try { return JSON.parse(localStorage.getItem(DEFAULTS_KEY)) || SC(ZERO_DEFAULTS); } catch { return SC(ZERO_DEFAULTS); } }
  function saveDefaults(obj){ try { localStorage.setItem(DEFAULTS_KEY, JSON.stringify(obj)); } catch (_) {} }

  function cloneOptions(fromSelect, toSelect){
    toSelect.innerHTML = '';
    [...fromSelect.options].forEach(o=>{ const opt = document.createElement('option'); opt.value = o.value; opt.textContent = o.textContent; toSelect.appendChild(opt); });
  }

  function hydrateModalOptions(){
    cloneOptions(offShowEl, el.d_single_show); cloneOptions(offShowEl, el.d_form_show);
    cloneOptions(offBriefEl, el.d_single_brief); cloneOptions(offBriefEl, el.d_form_brief);
    cloneOptions(offStepEl, el.d_single_step); cloneOptions(offStepEl, el.d_form_step);
    cloneOptions(offEngEl, el.d_single_eng); cloneOptions(offEngEl, el.d_form_eng);
  }

  function setModalFromDefaults(d){
    const s = d.single, f = d.formation;
    setSelectValueAndPaint(el.d_single_show, s.show); setSelectValueAndPaint(el.d_single_brief, s.brief); setSelectValueAndPaint(el.d_single_step, s.step); setSelectValueAndPaint(el.d_single_eng, s.eng);
    setSelectValueAndPaint(el.d_form_show, f.show); setSelectValueAndPaint(el.d_form_brief, f.brief); setSelectValueAndPaint(el.d_form_step, f.step); setSelectValueAndPaint(el.d_form_eng, f.eng);
  }

  function getDefaultsFromModal(){
    return {
      enabled: true,
      single: { show: parseInt(el.d_single_show.value||'0',10), brief: parseInt(el.d_single_brief.value||'0',10), step: parseInt(el.d_single_step.value||'0',10), eng: parseInt(el.d_single_eng.value||'0',10) },
      formation: { show: parseInt(el.d_form_show.value||'0',10), brief: parseInt(el.d_form_brief.value||'0',10), step: parseInt(el.d_form_step.value||'0',10), eng: parseInt(el.d_form_eng.value||'0',10) }
    };
  }

  function openDefaultsModal(){ hydrateModalOptions(); el.modal.style.display = 'block'; setModalFromDefaults(loadDefaults()); }
  function closeDefaultsModal(){ el.modal.style.display = 'none'; }

  el.btn.addEventListener('click', openDefaultsModal);
  el.save.addEventListener('click', () => { saveDefaults(getDefaultsFromModal()); const isForm = formBtn.classList.contains('active'); applyProfile(isForm ? 'FORM' : 'SINGLE'); closeDefaultsModal(); });
  el.reset.addEventListener('click', () => { setModalFromDefaults(SC(ZERO_DEFAULTS)); });
  el.cancel.addEventListener('click', closeDefaultsModal);

  function setSelectValueAndPaint(sel, val) {
    const v = String(val); sel.value = v;
    if (sel.value !== v) { const idx = [...sel.options].findIndex(o => o.value === v); if (idx >= 0) sel.selectedIndex = idx; }
    sel.dispatchEvent(new Event('change', { bubbles: true }));
  }

  function deviceOffsetHours(){ return - (new Date().getTimezoneOffset()) / 60; }
  function formatOffsetLabel(off){ const sign = off>=0?'+':''; const frac = Math.abs(off) % 1; const mins = frac ? ':'+String(Math.round(frac*60)).padStart(2,'0') : ''; return `UTC${sign}${Math.trunc(off)}${mins}`; }
  
  function updateNowPanel(){
    const d = new Date(); const off = deviceOffsetHours(); const local = new Date(d.getTime() + off*3600*1000);
    const lh = String(local.getUTCHours()).padStart(2,'0'), lm = String(local.getUTCMinutes()).padStart(2,'0');
    const zh = String(d.getUTCHours()).padStart(2,'0'), zm = String(d.getUTCMinutes()).padStart(2,'0');
    nowPanel.textContent = `${lh}${lm}L / ${zh}${zm}Z (${formatOffsetLabel(off)})`;
  }

  function setActive(element, on){ element.classList.toggle('active', !!on); }
  function hmm(min){ const h=Math.floor(min/60), m=min%60; return `${h}:${String(m).padStart(2,'0')}`; }
  function maskTimeDigits(v){ v = v.replace(/[^\d]/g,'').slice(0,4); if(v.length>=3) v = v.slice(0,2)+':'+v.slice(2); return v; }
  function padHHMM(s){ const m=/^(\d{1,2}):(\d{2})$/.exec(s||''); if(!m) return s; return `${m[1].padStart(2,'0')}:${m[2].padStart(2,'0')}`; }
  
  toEl.addEventListener('input', ()=> toEl.value = maskTimeDigits(toEl.value));
  durEl.addEventListener('input', ()=> durEl.value = maskTimeDigits(durEl.value));
  ['blur','change'].forEach(ev=>{
    toEl.addEventListener(ev, ()=> toEl.value = padHHMM(toEl.value));
    durEl.addEventListener(ev, ()=> durEl.value = padHHMM(durEl.value));
  });

  function parseHM(s){ if(!s || !/^\d{1,2}:\d{2}$/.test(s)) return null; const [h,m]=s.split(':').map(Number); if(h<0||h>23||m<0||m>59) return null; return {h,m}; }
  function parseDur(s){ const p=parseHM(s); return p? p.h*60+p.m : null; }
  function buildUTCDate(dateStr, hm){ const [Y,Mo,D]=dateStr.split('-').map(Number); return new Date(Date.UTC(Y,Mo-1,D, hm.h, hm.m,0,0)); }

  function addMin(d,m){ return new Date(d.getTime()+m*60000); }
  function fmtLocalWithOffset(dt, offsetHours){
    const ms = dt.getTime() + offsetHours*3600*1000;
    const hh = (new Date(ms)).getUTCHours().toString().padStart(2,'0');
    const mm = (new Date(ms)).getUTCMinutes().toString().padStart(2,'0');
    return `${hh}${mm}`;
  }
  function fmtZ(dt){ const hh=dt.getUTCHours().toString().padStart(2,'0'); const mm=dt.getUTCMinutes().toString().padStart(2,'0'); return `${hh}${mm}Z`; }
  function fmtZuluDayTag(dt) {
    const day = String(dt.getUTCDate()).padStart(2, '0');
    const MON = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    const mon = MON[dt.getUTCMonth()];
    return `${day}${mon} Z`;
  }

  function lineDual(name, dt, localOffset, hint, tzLabel = null) {
    const l = document.createElement('div'); l.className = 'tc-line';
    const left = document.createElement('div');
    const baseLabel = tzLabel ? `${name} <span class="tc-hint">(${tzLabel})</span>` : name;
    const withDay = (name === 'T/O' || name === 'Land') ? `${baseLabel} <span class="tc-hint">${fmtZuluDayTag(dt)}</span>` : baseLabel;
    left.innerHTML = `<span class="tc-name">${withDay}</span>${hint ? ` <span class="tc-hint">(${hint})</span>` : ''}`;
    const right = document.createElement('div'); right.className = 'tc-time';
    right.textContent = `${fmtLocalWithOffset(dt, localOffset)}L / ${fmtZ(dt)}`;
    l.appendChild(left); l.appendChild(right); out.appendChild(l);
  }
  function line(name, dt, off, hint){ lineDual(name, dt, off, hint); }

  function tzLabelFromOffset(off){
    const sign = off>=0?'+':''; const hours = Math.trunc(off); const mins = Math.round((Math.abs(off) - Math.floor(Math.abs(off))) * 60);
    if(mins===0) return `UTC${sign}${hours}`; return `UTC${sign}${hours}:${String(mins).padStart(2,'0')}`;
  }
  function genTZOptions(select){
    const opts = []; for(let v=-12; v<=14; v+=0.5) opts.push(v);
    [5.75,12.75,8.75].forEach(v=>opts.push(v));
    [...new Set(opts)].sort((a,b)=>a-b).forEach(v=>{ const o = document.createElement('option'); o.value = v; o.textContent = tzLabelFromOffset(v); select.appendChild(o); });
  }

  function getCalcSignature(){
    return JSON.stringify({ date: dateEl.value, to: toEl.value, dur: durEl.value, tzDep: tzDepEl.value, tzArr: tzArrEl.value, offShow: offShowEl.value, offBrief: offBriefEl.value, offStep: offStepEl.value, offEng: offEngEl.value, mode, profile });
  }
  let lastRunSig = ''; let mode='BASIC', profile='SINGLE';

  function applyProfile(p){
    profile = p; const d = loadDefaults(); const src = d.enabled ? (p === 'SINGLE' ? d.single : d.formation) : ZERO_DEFAULTS[p === 'SINGLE' ? 'single' : 'formation'];
    setSelectValueAndPaint(offShowEl, src.show); setSelectValueAndPaint(offBriefEl, src.brief); setSelectValueAndPaint(offStepEl, src.step); setSelectValueAndPaint(offEngEl, src.eng);
    setActive(singleBtn, p === 'SINGLE'); setActive(formBtn, p === 'FORM');
  }
  function applyMode(m){ mode = m; setActive(basicBtn, m==='BASIC'); setActive(augBtn, m==='AUG'); }

  function setValidity(element, isValid) {
    element.classList.remove('error','ok');
    if (!element.value || !isValid) element.classList.add('error'); else element.classList.add('ok');
  }

  function validateInputs() {
    const toValid  = !!parseHM(toEl.value); const durValid = parseDur(durEl.value) != null;
    setValidity(toEl, toValid); setValidity(durEl, durValid);
    calcBtn.classList.remove('ready', 'needs-run'); calcBtn.disabled = true;
    if (toValid && durValid) {
      calcBtn.classList.add('ready'); calcBtn.disabled = false;
      const sig = getCalcSignature();
      if (lastRunSig && sig !== lastRunSig) calcBtn.classList.add('needs-run'); else calcBtn.classList.remove('needs-run');
    }
    return toValid && durValid;
  }

  [toEl, durEl].forEach(element => {
    element.addEventListener('input', validateInputs); element.addEventListener('blur', validateInputs);
    element.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); element.blur(); if (validateInputs()) calc(); } });
  });

  function updateFdpNotice(landDt, fdpDt) {
    const notice = tc$('tc-fdpNotice'); if (!notice) return;
    notice.classList.remove('warn', 'bad'); notice.style.display = 'none'; notice.textContent = '';
    if (!(landDt instanceof Date) || isNaN(landDt) || !(fdpDt instanceof Date) || isNaN(fdpDt)) return;
    const landMs = landDt.getTime(), fdpMs = fdpDt.getTime(), THIRTY_MIN = 30 * 60 * 1000;
    if (landMs >= fdpMs) { notice.textContent = '⚠️ FDP EXCEEDED'; notice.classList.add('bad'); notice.style.display = 'inline-block'; } 
    else if (landMs >= fdpMs - THIRTY_MIN) { notice.textContent = '⚠️ Approaching FDP'; notice.classList.add('warn'); notice.style.display = 'inline-block'; }
  }

  function calc(){
    out.innerHTML='';
    if (!validateInputs()) { if (!parseHM(toEl.value)) toEl.focus(); else if (parseDur(durEl.value) == null) durEl.focus(); return; }
    const d = new Date();
    if(!dateEl.value){ const yyyy=d.getUTCFullYear(), mm=String(d.getUTCMonth()+1).padStart(2,'0'), dd=String(d.getUTCDate()).padStart(2,'0'); dateEl.value = `${yyyy}-${mm}-${dd}`; }
    const dateStr = dateEl.value, hmTO = parseHM(toEl.value), dur = parseDur(durEl.value);
    const offDep = Number(tzDepEl.value), offArr = Number(tzArrEl.value);
    if(!dateStr || !hmTO || dur==null){ out.textContent='Enter date, T/O (24h), duration.'; return; }

    const to = buildUTCDate(dateStr, hmTO); const ld = addMin(to, dur);
    const show = addMin(to, -Number(offShowEl.value||0)), brief = addMin(to, -Number(offBriefEl.value||0)), step = addMin(to, -Number(offStepEl.value||0)), eng = addMin(to, -Number(offEngEl.value||0));
    const alert = addMin(show, -60), crewRest = addMin(alert, -12*60), lastBeer = addMin(to, -12*60), lastAmbien = addMin(alert, -6*60);
    const MOD = (mode==='BASIC') ? {fdp:16*60, cdt:18*60} : {fdp:24*60, cdt:24*60+45};
    const fdpEnd = addMin(show, MOD.fdp), cdtEnd = addMin(show, MOD.cdt);

    basicBtn.classList.remove('bad'); augBtn.classList.remove('bad');
    if (ld.getTime() >= fdpEnd.getTime()) { if (mode === 'BASIC') basicBtn.classList.add('bad'); else augBtn.classList.add('bad'); }

    const latestAlert = addMin(alert, 6*60), picExtAlert = addMin(alert, 8*60), reevalORM = addMin(to, 4*60);
    const train = addMin(show, 12*60), opTac = addMin(show, 14*60), minTurnTO = addMin(ld, 17*60), lateTOCap = addMin(fdpEnd, -dur);

    line('Crew Rest', crewRest, offDep, 'alert−12'); line('Last Beer', lastBeer, offDep, 'T/O−12'); line('Last Ambien', lastAmbien, offDep, 'alert−6');
    line('Alert', alert, offDep, 'show−1'); line('Show', show, offDep, `T/O−${hmm(Number(offShowEl.value||0))}`);
    line('Brief', brief, offDep, `T/O−${hmm(Number(offBriefEl.value||0))}`); line('Step', step, offDep, `T/O−${hmm(Number(offStepEl.value||0))}`);
    line('Eng St', eng, offDep, `T/O−${hmm(Number(offEngEl.value||0))}`); lineDual('T/O', to, offDep, null, tzLabelFromOffset(offDep));

    const durLine = document.createElement('div'); durLine.className='tc-line';
    const dh = String(Math.floor(dur/60)).padStart(2,'0'), dm = String(dur%60).padStart(2,'0');
    durLine.innerHTML = `<div class="tc-name">Sortie Dur</div><div class="tc-time">${dh}${dm}</div>`; out.appendChild(durLine);

    lineDual('Land', ld, offArr, null, tzLabelFromOffset(offArr));
    line('Late T/O Cap', lateTOCap, offDep, 'FDP − Dur'); line('Latest Alert', latestAlert, offDep, 'alert+6');
    line('PIC Extend Alert', picExtAlert, offDep, 'alert+8'); line('Re-Eval ORM', reevalORM, offDep, 'T/O+4');
    line('Train', train, offDep, 'show+12'); line('Tactical', opTac, offDep, 'show+14');
    line('FDP', fdpEnd, offDep, mode==='BASIC'?'show+16':'show+24'); line('CDT', cdtEnd, offDep, mode==='BASIC'?'show+18':'show+24:45');
    line('Min Turn T/O', minTurnTO, offArr, 'land+17');
    
    const pair = (label, dt, off) => { const shortLabel = (label === 'Land') ? 'Lnd' : label; const base = `${shortLabel}: ${fmtLocalWithOffset(dt, off)}L/${fmtZ(dt)}`; if (shortLabel === 'T/O' || shortLabel === 'Lnd') { return `${base} (${fmtZuluDayTag(dt)})`; } return base; };
    const durHHMM = `${String(Math.floor(dur/60)).padStart(2,'0')}${String(dur%60).padStart(2,'0')}`;

    lastCopyText = [ pair('Crew Rest', crewRest, offDep), pair('Alert', alert, offDep), pair('Show', show, offDep), pair('Brief', brief, offDep), pair('Step', step, offDep), pair('Eng St', eng, offDep), pair('T/O', to, offDep), `Dur: ${durHHMM}`, pair('Land', ld, offArr) ].join('\n');
    if (copyBtn) copyBtn.disabled = false;
    updateFdpNotice(ld, fdpEnd);
    
    lastRunSig = getCalcSignature();
    calcBtn.classList.add('ready'); calcBtn.classList.remove('needs-run'); calcBtn.disabled = false;
  }

  function resetTimeCalc(){
    const d=new Date(); const yyyy=d.getUTCFullYear(), mm=String(d.getUTCMonth()+1).padStart(2,'0'), dd=String(d.getUTCDate()).padStart(2,'0');
    dateEl.value=`${yyyy}-${mm}-${dd}`; toEl.value=''; durEl.value='';
    const off = deviceOffsetHours(); tzDepEl.value=String(off); tzArrEl.value=String(off);
    applyProfile('SINGLE'); applyMode('BASIC'); out.innerHTML='';

    lastCopyText = '';
    if (copyBtn) { copyBtn.disabled = true; copyBtn.textContent = 'Copy'; }
    lastRunSig = ''; calcBtn.classList.remove('needs-run', 'ready'); calcBtn.disabled = true;
    [toEl, durEl].forEach(element => element.classList.remove('error','ok'));
    validateInputs();
    basicBtn.classList.remove('bad','warn'); augBtn.classList.remove('bad','warn');
    const notice = tc$('tc-fdpNotice'); if (notice) { notice.classList.remove('warn','bad'); notice.style.display = 'none'; notice.textContent = ''; }
  }

  ['click','touchend'].forEach(ev=>{
    basicBtn.addEventListener(ev, ()=>{ applyMode('BASIC'); validateInputs(); });
    augBtn.addEventListener(ev, ()=>{ applyMode('AUG'); validateInputs(); });
    singleBtn.addEventListener(ev,()=>{ applyProfile('SINGLE'); validateInputs(); });
    formBtn.addEventListener(ev, ()=>{ applyProfile('FORM'); validateInputs(); });
    calcBtn.addEventListener(ev, calc);
    resetBtn.addEventListener(ev, resetTimeCalc);
  });

  [dateEl, tzDepEl, tzArrEl, offShowEl, offBriefEl, offStepEl, offEngEl].forEach(element => element.addEventListener('change', validateInputs));

  if (copyBtn) {
    copyBtn.addEventListener('click', async () => {
      if (!lastCopyText) return;
      try { await navigator.clipboard.writeText(lastCopyText); copyBtn.textContent = 'Copied!'; setTimeout(() => (copyBtn.textContent = 'Copy'), 1200); return; } 
      catch {
        const ta = document.createElement('textarea'); ta.value = lastCopyText; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.focus(); ta.select(); try { document.execCommand('copy'); } catch {}
        document.body.removeChild(ta); copyBtn.textContent = 'Copied!'; setTimeout(() => (copyBtn.textContent = 'Copy'), 1200);
      }
    });
  }

  function buildOffsetOptions(select, def){
    for(let m=0; m<=360; m+=5){
      const h=Math.floor(m/60), mm=m%60; const o=document.createElement('option'); o.value=m; o.textContent=`${h}:${String(mm).padStart(2,'0')}`;
      if(m===def) o.selected=true; select.appendChild(o);
    }
  }

  genTZOptions(tzDepEl); genTZOptions(tzArrEl);
  buildOffsetOptions(offShowEl,150); buildOffsetOptions(offBriefEl,120); buildOffsetOptions(offStepEl,60); buildOffsetOptions(offEngEl,30);

  const off = deviceOffsetHours(); tzDepEl.value = String(off); tzArrEl.value = String(off);
  resetTimeCalc(); updateNowPanel(); setInterval(updateNowPanel, 30000); validateInputs();
}

initTimeCalc();
</script>

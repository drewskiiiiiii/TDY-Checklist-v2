<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TDY Checklist">
<link rel="manifest" href="manifest2.json">

<link rel="apple-touch-icon" sizes="180x180" href="./icon.png?v=3">
<link rel="icon" type="image/png" sizes="192x192" href="./icon.png?v=3">
<link rel="icon" type="image/png" sizes="512x512" href="./icon.png?v=3">
<link rel="shortcut icon" href="./icon.png?v=3">

<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<title>TDY Mission Checklist</title>
<style>
  :root {
    --accent:        #1eb4f0;
    --accent-dim:    rgba(30, 180, 240, 0.18);
    --accent-border: rgba(30, 180, 240, 0.45);
    --accent-glow:   rgba(30, 180, 240, 0.6);
    --red:           #fa5252;
 
    --bg:          #000000;
    --surface:     #101010;
    --surface2:    #1a1a1a;
    --border:      #2a2a2a;
    --border-hi:   #3a3a3a;
    --text:        #f0f0f0;
    --muted:       #888888;
    --done-text:   #444444;
 
    --radius: 10px;
    --radius-sm: 6px;
  }
  
  /* ── LIGHT MODE VARIABLES ──────────────────────── */
  body.light-mode {
    --bg:          #ffffff;
    --surface:     #ffffff;
    --surface2:    #f4f5f7;
    --border:      #000000; /* Solid black boxes around items */
    --border-hi:   #000000; /* Solid black borders for inputs/checkboxes */
    --text:        #000000; /* High contrast black text */
    --muted:       #555555;
    --done-text:   #888888;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
    min-height: 100vh;
    padding-bottom: 90px;
    transition: background-color 0.2s, color 0.2s;
  }
 
  /* ── HEADER ─────────────────────────────────────── */
  .header {
    background: var(--surface);
    border-bottom: 1.5px solid var(--accent-border);
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    transition: background-color 0.2s, border-color 0.2s;
  }
  .header-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 10px;
  }
  .header-title-wrap {
    display: flex; flex-direction: column; gap: 6px;
  }
  .header h1 {
    font-size: 21px; font-weight: 800;
    letter-spacing: 0.3px;
    color: var(--accent);
    line-height: 1.1;
    width: fit-content;
  }
  .header-sub-row {
    display: flex; align-items: center; gap: 12px;
  }
  .cao-box {
    display: inline-block;
    font-size: 10px; font-weight: 800;
    letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border-hi);
    padding: 2px 6px; border-radius: 4px;
    width: fit-content;
    transition: all 0.2s;
  }
  
  /* ── THEME & BACKGROUND PICKER ───────────────────── */
  .theme-picker {
    display: flex; gap: 6px; align-items: center;
  }
  
  .color-picker-input {
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    border: none;
    background: transparent;
    cursor: pointer;
    padding: 0;
    transition: transform 0.15s;
  }
  .color-picker-input::-webkit-color-swatch-wrapper {
    padding: 0;
  }
  .color-picker-input::-webkit-color-swatch {
    border: 1.5px solid var(--border-hi);
    border-radius: 50%;
  }
  .color-picker-input::-moz-color-swatch {
    border: 1.5px solid var(--border-hi);
    border-radius: 50%;
  }
  .color-picker-input:active { transform: scale(0.9); }

  .theme-dot {
    width: 14px; height: 14px; border-radius: 50%;
    cursor: pointer; border: 1.5px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }
  .theme-dot.active { border-color: var(--text); transform: scale(1.15); }
  
  .theme-sep { width: 1px; height: 16px; background: var(--border-hi); margin: 0 4px; }
  .bg-dot { border: 1.5px solid var(--border-hi); width: 18px; height: 18px; }
  
  .reset-btn {
    background: none;
    border: 1px solid var(--border-hi);
    color: var(--muted);
    font-size: 12px; font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer; font-family: inherit;
    text-transform: uppercase; letter-spacing: 0.4px;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .reset-btn:active { opacity: 0.5; }
 
  /* ── EDIT MODE UI ────────────────────────────────── */
  .delete-btn {
    display: none;
    background: none; border: none;
    color: var(--red); font-size: 14px; font-weight: bold;
    cursor: pointer; padding: 2px 6px;
    border-radius: 4px;
    margin-left: auto;
  }
  .delete-btn:active { opacity: 0.5; }
  
  .add-btn {
    display: none;
    background: var(--surface2); border: 1px dashed var(--border-hi);
    color: var(--muted); font-size: 12px; font-weight: 600;
    cursor: pointer; padding: 6px 12px;
    border-radius: var(--radius-sm); width: 100%; margin-top: 6px;
    text-transform: uppercase; letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  
  /* When Edit Mode is Active */
  body.edit-mode .delete-btn { display: inline-block; }
  body.edit-mode .add-btn { display: block; }
  
  body.edit-mode .editable-text {
    pointer-events: auto;
    border-bottom: 1px dashed var(--border-hi);
  }
  body.edit-mode .editable-text:hover, 
  body.edit-mode .editable-text:focus {
    border-bottom-color: var(--accent);
  }
  body.edit-mode .tab.active .editable-text { border-bottom-color: var(--accent); }
  
  /* Disable normal clicking in edit mode to prioritize editing */
  body.edit-mode .check-item .checkbox,
  body.edit-mode .check-item .item-notes { pointer-events: none; opacity: 0.3; }

  /* ── SEARCH ──────────────────────────────────────── */
  .search-wrap { position: relative; margin-bottom: 10px; }
  .search-icon {
    position: absolute; left: 11px; top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    color: var(--muted); pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 9px 34px 9px 36px;
    border: 1px solid var(--border-hi);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    font-size: 16px; font-family: inherit;
    outline: none;
    transition: border-color 0.15s, background-color 0.2s, color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  .search-clear {
    position: absolute; right: 9px; top: 50%;
    transform: translateY(-50%);
    background: var(--muted); border: none;
    border-radius: 50%; width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0;
    opacity: 0; transition: opacity 0.15s; pointer-events: none;
  }
  .search-clear.visible { opacity: 1; pointer-events: auto; }
  .search-clear svg { width: 10px; height: 10px; color: white; }
 
  /* ── PROGRESS ────────────────────────────────────── */
  .progress-stats {
    display: flex; justify-content: space-between;
    font-size: 12px; font-weight: 600;
    color: var(--muted); margin-bottom: 5px;
  }
  .progress-track { background: var(--border); border-radius: 4px; height: 5px; overflow: hidden; transition: background-color 0.2s; }
  .progress-fill {
    height: 100%; background: var(--accent); border-radius: 4px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1), background-color 0.3s;
    box-shadow: 0 0 8px var(--accent-glow);
  }
 
  /* ── SEARCH LABEL / NO RESULTS ───────────────────── */
  .search-results-label {
    display: none; font-size: 12px; font-weight: 600;
    color: var(--muted); padding: 8px 16px 0;
  }
  .search-results-label.visible { display: block; }
  .no-results {
    display: none; text-align: center;
    padding: 40px 20px; color: var(--muted); font-size: 15px;
  }
  .no-results.visible { display: block; }
 
  /* ── TABS ────────────────────────────────────────── */
  .tabs {
    display: flex; overflow-x: auto; gap: 7px;
    padding: 10px 16px 0;
    scrollbar-width: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    transition: background-color 0.2s, border-color 0.2s;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tabs.search-active { display: none; }
  .tab {
    flex-shrink: 0;
    border: 1px solid var(--border-hi);
    background: var(--surface2);
    color: var(--muted);
    font-size: 13px; font-weight: 600;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer; font-family: inherit;
    transition: all 0.12s;
    white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
  }
  .tab-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--border-hi); transition: background 0.2s; flex-shrink: 0;
  }
  .tab.active {
    border-color: var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
  }
  .tab.active .tab-dot { background: var(--accent); }
  
  /* ── SECTION ─────────────────────────────────────── */
  .section { display: none; padding: 12px 16px 0; }
  .section.active { display: block; }
  .section.search-active { display: block !important; }
 
  .section-search-label {
    display: none;
    font-size: 11px; font-weight: 800;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--accent); border: 1px solid var(--accent-border);
    padding: 2px 10px; border-radius: 4px;
    margin-bottom: 6px; width: fit-content;
  }
  .section.search-active .section-search-label { display: inline-block; }
 
  /* ── GROUP HEADER ────────────────────────────────── */
  .group-header {
    font-size: 11px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted);
    padding: 14px 0 6px;
    display: flex; align-items: center; gap: 10px;
  }
  .group-header::after { content: ''; flex: 1; height: 1px; background: var(--border); transition: background-color 0.2s; }
  .group-header.search-hidden { display: none !important; }
 
  /* ── EDITABLE TEXT ───────────────────────────────── */
  .editable-text {
    outline: none;
    border-bottom: 1px dashed transparent;
    transition: border-bottom-color 0.2s, color 0.2s;
    cursor: text;
    padding-bottom: 1px;
    pointer-events: none; /* Disabled unless in edit mode */
  }
 
  /* ── CHECKLIST ───────────────────────────────────── */
  .checklist { display: flex; flex-direction: column; gap: 3px; }
  .check-item.search-hidden { display: none !important; }
 
  .check-item {
    display: flex; align-items: center; gap: 13px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent-border);
    border-radius: var(--radius-sm);
    padding: 13px 14px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
    user-select: none;
    min-height: 52px;
  }
  .check-item:active { background: var(--surface2); }
  .check-item.done {
    border-left-color: var(--border);
    opacity: 0.45;
  }
  .check-item.done .item-label {
    text-decoration: line-through;
    color: var(--done-text);
  }
  
  /* Disable strikethrough in edit mode so text is clear */
  body.edit-mode .check-item.done .item-label { text-decoration: none; color: var(--text); }
 
  /* ── CHECKBOX ────────────────────────────────────── */
  .checkbox {
    width: 24px; height: 24px; flex-shrink: 0;
    border: 1.5px solid var(--border-hi);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    background: var(--surface2);
  }
  .check-item.done .checkbox {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
  }
  .checkmark { display: none; width: 11px; height: 8px; }
  .checkmark path { stroke: #000; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .check-item.done .checkmark { display: block; }
 
  /* ── ITEM TEXT ───────────────────────────────────── */
  .item-content { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .item-label { font-size: 16px; font-weight: 500; line-height: 1.35; color: var(--text); transition: color 0.2s; }
 
  /* ── NOTES ───────────────────────────────────────── */
  .item-notes {
    font-size: 14px;
    padding: 7px 10px;
    border: 1px solid var(--border-hi);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    font-family: inherit; 
    width: 100%; 
    outline: none;
    transition: border-color 0.15s, background-color 0.2s, color 0.2s;
    resize: none; /* Prevents manual drag resizing */
    overflow: hidden; /* Hides internal scrollbar for auto-grow */
    line-height: 1.4;
  }
  .item-notes:focus { border-color: var(--accent); }
  .item-notes::placeholder { color: var(--muted); }
  .check-item.done .item-notes { opacity: 0.4; }
 
  /* ── BOTTOM SUMMARY ──────────────────────────────── */
  .phase-summary {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1.5px solid var(--accent-border);
    padding: 10px 20px 26px;
    display: flex; justify-content: space-between;
    align-items: center;
    transition: background-color 0.2s, border-color 0.2s;
  }
  .phase-stat { text-align: left; }
  .phase-stat .ps-num { font-size: 22px; font-weight: 800; color: var(--accent); }
  .phase-stat .ps-label {
    font-size: 10px; font-weight: 700;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.8px; margin-top: 2px;
  }
  
  .edit-toggle-btn {
    background: var(--surface2);
    border: 1px solid var(--border-hi);
    color: var(--text);
    font-size: 13px; font-weight: 600;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer; font-family: inherit;
    transition: all 0.2s;
  }
  .edit-toggle-btn.active {
    background: var(--accent-dim);
    color: var(--accent);
    border-color: var(--accent);
  }
</style>
</head>
<body>
 
<div class="header">
  <div class="header-top">
    <div class="header-title-wrap">
      <h1 class="editable-text" contenteditable="true" spellcheck="false" id="main-title">KC-135 TDY Checklist</h1>
      <div class="header-sub-row">
        <div class="cao-box">CAO: <span id="cao-date"></span></div>
        <div class="theme-picker" id="theme-picker">
          <input type="color" id="custom-color-picker" class="color-picker-input" value="#1eb4f0" title="Choose Accent Color">
          
          <div class="theme-sep"></div>
          
          <div class="theme-dot bg-dot" style="background: #000000;" data-bg="dark" onclick="setBgMode('dark')"></div>
          <div class="theme-dot bg-dot" style="background: #ffffff;" data-bg="light" onclick="setBgMode('light')"></div>
        </div>
      </div>
    </div>
    <button class="reset-btn" onclick="resetAll()">Reset</button>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="8.5" cy="8.5" r="5.5"/><path d="M15 15l-3-3"/>
    </svg>
    <input type="search" class="search-input" id="search-input"
      placeholder="Search checklist…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="search-clear" id="search-clear" aria-label="Clear search">
      <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M2 2l6 6M8 2l-6 6"/>
      </svg>
    </button>
  </div>
  <div class="progress-stats">
    <span id="prog-label">0 of 0 complete</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>
 
<div class="tabs" id="tabs-nav"></div>
 
<div class="search-results-label" id="search-results-label"></div>
<div class="no-results" id="no-results">No items match your search.</div>
 
<div id="sections-wrap"></div>

<div class="phase-summary">
  <div class="phase-stat" id="phase-summary-stats"></div>
  <button class="edit-toggle-btn" id="edit-mode-btn" onclick="toggleEditMode()">Edit Checklist</button>
</div>
 
<script>
// Auto-update CAO to the last modified date of the document
const lastModDate = new Date(document.lastModified);
const dateOptions = { day: '2-digit', month: 'short', year: 'numeric' };
document.getElementById('cao-date').textContent = lastModDate.toLocaleDateString('en-US', dateOptions).toUpperCase();

const DEFAULT_SECTIONS = [

    groups: [

// ── COLOR CONVERTER & THEME APPLY ────────────────────────────────────────────
function hexToRgb(hex) {
  // Expand shorthand form (e.g. "03F") to full form (e.g. "0033FF")
  var shorthandRegex = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
  hex = hex.replace(shorthandRegex, function(m, r, g, b) { return r + r + g + g + b + b; });
  var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
}

function applyCustomColor(hex) {
  const rgb = hexToRgb(hex);
  if (!rgb) return;
  const { r, g, b } = rgb;
  
  document.documentElement.style.setProperty('--accent', hex);
  document.documentElement.style.setProperty('--accent-dim', `rgba(${r}, ${g}, ${b}, 0.18)`);
  document.documentElement.style.setProperty('--accent-border', `rgba(${r}, ${g}, ${b}, 0.45)`);
  document.documentElement.style.setProperty('--accent-glow', `rgba(${r}, ${g}, ${b}, 0.6)`);
  
  localStorage.setItem('tdy2_theme_color', hex);
  
  // Sync the picker value
  const picker = document.getElementById('custom-color-picker');
  if (picker && picker.value !== hex) picker.value = hex;
}

// Attach listener to the color picker
document.getElementById('custom-color-picker').addEventListener('input', (e) => {
  applyCustomColor(e.target.value);
});

function setBgMode(mode) {
  if (mode === 'light') {
    document.body.classList.add('light-mode');
  } else {
    document.body.classList.remove('light-mode');
  }
  localStorage.setItem('tdy2_bg', mode);
  
  document.querySelectorAll('.bg-dot').forEach(el => el.classList.remove('active'));
  const activeDot = document.querySelector(`.bg-dot[data-bg="${mode}"]`);
  if(activeDot) activeDot.classList.add('active');
}
 
let state = {}, notes = {}, SECTIONS = [];
let activeTabId = null;
let isEditMode = false;
 
function loadState() {
  try { state = JSON.parse(localStorage.getItem('tdy2_state') || '{}'); } catch(e) { state = {}; }
  try { notes = JSON.parse(localStorage.getItem('tdy2_notes') || '{}'); } catch(e) { notes = {}; }
  try { 
    const savedSec = localStorage.getItem('tdy2_sections');
    SECTIONS = savedSec ? JSON.parse(savedSec) : JSON.parse(JSON.stringify(DEFAULT_SECTIONS)); 
  } catch(e) { SECTIONS = JSON.parse(JSON.stringify(DEFAULT_SECTIONS)); }
  
  const savedTitle = localStorage.getItem('tdy2_title');
  if (savedTitle) document.getElementById('main-title').textContent = savedTitle;

  const savedColor = localStorage.getItem('tdy2_theme_color') || '#1eb4f0';
  applyCustomColor(savedColor);
  
  const savedBg = localStorage.getItem('tdy2_bg') || 'dark';
  setBgMode(savedBg);
}
function saveState() {
  localStorage.setItem('tdy2_state', JSON.stringify(state));
  localStorage.setItem('tdy2_notes', JSON.stringify(notes));
}
function saveSections() {
  localStorage.setItem('tdy2_sections', JSON.stringify(SECTIONS));
}

function toggleEditMode() {
  isEditMode = !isEditMode;
  document.body.classList.toggle('edit-mode', isEditMode);
  const btn = document.getElementById('edit-mode-btn');
  btn.textContent = isEditMode ? 'Done Editing' : 'Edit Checklist';
  btn.classList.toggle('active', isEditMode);
}

// Editable Title Initialization
const titleEl = document.getElementById('main-title');
titleEl.addEventListener('blur', e => {
   const newTitle = e.target.textContent.trim();
   if (newTitle) {
       localStorage.setItem('tdy2_title', newTitle);
   } else {
       e.target.textContent = 'KC-135 TDY Checklist';
       localStorage.removeItem('tdy2_title');
   }
});
titleEl.addEventListener('keydown', e => {
   if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); }
});

function itemKey(sId, gTitle, item) { return `${sId}||${gTitle}||${item}`; }
function getAllKeys() {
  const k = [];
  SECTIONS.forEach(s => s.groups.forEach(g => g.items.forEach(i => k.push(itemKey(s.id, g.title, i)))));
  return k;
}
 
function updateProgress() {
  const all = getAllKeys(), done = all.filter(k => state[k]).length;
  const pct = all.length ? Math.round(done / all.length * 100) : 0;
  document.getElementById('prog-label').textContent = `${done} of ${all.length} complete`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
 
  document.getElementById('phase-summary-stats').innerHTML = `
      <div class="ps-num">${done}/${all.length}</div>
      <div class="ps-label">Total Done</div>
  `;
 
  SECTIONS.forEach(s => {
    const sKeys = [];
    s.groups.forEach(g => g.items.forEach(i => sKeys.push(itemKey(s.id, g.title, i))));
    const sDone = sKeys.filter(k => state[k]).length;
    const dot = document.querySelector(`[data-tab="${s.id}"] .tab-dot`);
    if (dot) dot.style.background = (sDone === sKeys.length && sKeys.length > 0) ? 'var(--accent)' : '';
  });
}
 
function toggleItem(key, el) {
  if (isEditMode) return; // Prevent checking off items while in edit mode
  state[key] = !state[key]; saveState();
  el.classList.toggle('done', state[key]);
  updateProgress();
}
 
function resetAll() {
  if (!confirm('Reset all checked items and clear notes?')) return;
  state = {}; 
  notes = {}; 
  saveState();
  build();
}
 
function switchTab(id) {
  activeTabId = id;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.dataset.section === id));
}

// ── DELETE ACTIONS ─────────────────────────────────────────────────────────
function deleteSection(sIndex) {
  if (!confirm(`Delete entire section "${SECTIONS[sIndex].label}"?`)) return;
  SECTIONS.splice(sIndex, 1);
  if (SECTIONS.length > 0) activeTabId = SECTIONS[0].id;
  saveSections(); build();
}

function deleteGroup(sIndex, gIndex) {
  if (!confirm(`Delete category "${SECTIONS[sIndex].groups[gIndex].title}"?`)) return;
  SECTIONS[sIndex].groups.splice(gIndex, 1);
  saveSections(); build();
}

function deleteItem(sIndex, gIndex, iIndex) {
  SECTIONS[sIndex].groups[gIndex].items.splice(iIndex, 1);
  saveSections(); build();
}

// ── ADD ACTIONS ────────────────────────────────────────────────────────────
function addSection() {
  const name = prompt('New Section Name:');
  if (!name) return;
  const id = name.toLowerCase().replace(/\s+/g, '-');
  SECTIONS.push({ id, label: name, groups: [] });
  activeTabId = id;
  saveSections(); build();
}

function addGroup(sIndex) {
  const name = prompt('New Category Name:');
  if (!name) return;
  SECTIONS[sIndex].groups.push({ title: name, items: [] });
  saveSections(); build();
}

function addItem(sIndex, gIndex) {
  const name = prompt('New Item Name:');
  if (!name) return;
  SECTIONS[sIndex].groups[gIndex].items.push(name);
  saveSections(); build();
}
 
// ── SEARCH ──────────────────────────────────────────────────────────────────
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function highlight(text, q) {
  return text.replace(new RegExp(`(${escRe(q)})`, 'gi'), '<mark class="search-highlight">$1</mark>');
}
 
function runSearch(query) {
  const q = query.trim().toLowerCase();
  const tabsNav = document.getElementById('tabs-nav');
  const label   = document.getElementById('search-results-label');
  const noRes   = document.getElementById('no-results');
  const clrBtn  = document.getElementById('search-clear');
 
  clrBtn.classList.toggle('visible', q.length > 0);
 
  if (!q) {
    tabsNav.classList.remove('search-active');
    label.classList.remove('visible');
    noRes.classList.remove('visible');
    document.querySelectorAll('.section').forEach(s => {
      s.classList.remove('search-active'); s.style.display = '';
    });
    document.querySelectorAll('.check-item').forEach(el => {
      el.classList.remove('search-hidden');
      const lbl = el.querySelector('.item-label');
      if (lbl && lbl.dataset.original) lbl.innerHTML = lbl.dataset.original;
    });
    document.querySelectorAll('.group-header').forEach(el => el.classList.remove('search-hidden'));
    switchTab(activeTabId || (SECTIONS.length ? SECTIONS[0].id : null));
    return;
  }
 
  tabsNav.classList.add('search-active');
  document.querySelectorAll('.section').forEach(s => {
    s.classList.remove('active'); s.classList.add('search-active');
  });
 
  let total = 0;
  SECTIONS.forEach(s => {
    s.groups.forEach(g => {
      let gVis = 0;
      const gEl = document.querySelector(`[data-group="${s.id}||${g.title}"]`);
      document.querySelectorAll(`[data-group-items="${s.id}||${g.title}"] .check-item`).forEach(row => {
        const lbl = row.querySelector('.item-label');
        const orig = lbl.dataset.original || lbl.textContent;
        lbl.dataset.original = orig;
        if (orig.toLowerCase().includes(q)) {
          row.classList.remove('search-hidden');
          lbl.innerHTML = highlight(orig, query.trim());
          gVis++; total++;
        } else {
          row.classList.add('search-hidden');
          lbl.innerHTML = orig;
        }
      });
      if (gEl) gEl.classList.toggle('search-hidden', gVis === 0);
    });
  });
 
  document.querySelectorAll('.section').forEach(sec => {
    sec.style.display = sec.querySelectorAll('.check-item:not(.search-hidden)').length > 0 ? 'block' : 'none';
  });
 
  label.textContent = `${total} result${total !== 1 ? 's' : ''} for "${query.trim()}"`;
  label.classList.add('visible');
  noRes.classList.toggle('visible', total === 0);
}
 
function initSearch() {
  const inp = document.getElementById('search-input');
  const clr = document.getElementById('search-clear');
  inp.addEventListener('input', e => runSearch(e.target.value));
  clr.addEventListener('click', () => { inp.value = ''; runSearch(''); inp.focus(); });
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); });
}
 
// ── BUILD ────────────────────────────────────────────────────────────────────
function build() {
  loadState();
  const tabsNav = document.getElementById('tabs-nav');
  const wrap    = document.getElementById('sections-wrap');
  
  tabsNav.innerHTML = '';
  wrap.innerHTML = '';
  
  if (!activeTabId && SECTIONS.length > 0) activeTabId = SECTIONS[0].id;

  SECTIONS.forEach((s, sIndex) => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (s.id === activeTabId ? ' active' : '');
    tab.dataset.tab = s.id;
    tab.innerHTML = `<span class="tab-dot"></span>`;
    
    // Editable Section Name
    const tabText = document.createElement('span');
    tabText.className = 'editable-text';
    tabText.contentEditable = true;
    tabText.spellcheck = false;
    tabText.textContent = s.label;
    
    tabText.addEventListener('blur', (e) => {
      const newLabel = e.target.textContent.trim();
      if (newLabel && newLabel !== s.label) {
        s.label = newLabel;
        saveSections();
        const secLbl = document.querySelector(`.section[data-section="${s.id}"] .section-search-label`);
        if (secLbl) secLbl.textContent = newLabel;
      } else {
        e.target.textContent = s.label; 
      }
    });
    tabText.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); }
    });

    const delSecBtn = document.createElement('button');
    delSecBtn.className = 'delete-btn';
    delSecBtn.innerHTML = '✖';
    delSecBtn.onclick = (e) => { e.stopPropagation(); deleteSection(sIndex); };

    tab.appendChild(tabText);
    tab.appendChild(delSecBtn);
    
    tab.addEventListener('click', (e) => {
      if (e.target !== tabText && e.target !== delSecBtn) switchTab(s.id);
    });
    tabText.addEventListener('focus', () => switchTab(s.id));
    tabsNav.appendChild(tab);
 
    const section = document.createElement('div');
    section.className = 'section' + (s.id === activeTabId ? ' active' : '');
    section.dataset.section = s.id;
 
    const secLbl = document.createElement('div');
    secLbl.className = 'section-search-label';
    secLbl.textContent = s.label;
    section.appendChild(secLbl);
 
    s.groups.forEach((g, gIndex) => {
      const gh = document.createElement('div');
      gh.className = 'group-header';
      gh.dataset.group = `${s.id}||${g.title}`;
      
      // Editable Group Title
      const ghText = document.createElement('span');
      ghText.className = 'editable-text';
      ghText.contentEditable = true;
      ghText.spellcheck = false;
      ghText.textContent = g.title;
      
      ghText.addEventListener('blur', (e) => {
        const newTitle = e.target.textContent.trim();
        if (newTitle && newTitle !== g.title) {
          const oldTitle = g.title;
          
          g.items.forEach(item => {
            const oldKey = itemKey(s.id, oldTitle, item);
            const newKey = itemKey(s.id, newTitle, item);
            if (state[oldKey] !== undefined) { state[newKey] = state[oldKey]; delete state[oldKey]; }
            if (notes[oldKey] !== undefined) { notes[newKey] = notes[oldKey]; delete notes[oldKey]; }
          });
          
          g.title = newTitle;
          saveState(); saveSections(); build(); 
        } else { e.target.textContent = g.title; }
      });
      ghText.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); } });
      
      const delGroupBtn = document.createElement('button');
      delGroupBtn.className = 'delete-btn';
      delGroupBtn.innerHTML = '✖';
      delGroupBtn.onclick = () => deleteGroup(sIndex, gIndex);
      
      gh.appendChild(ghText);
      gh.appendChild(delGroupBtn);
      section.appendChild(gh);
 
      const cl = document.createElement('div');
      cl.className = 'checklist';
      cl.dataset.groupItems = `${s.id}||${g.title}`;
 
      g.items.forEach((item, iIndex) => {
        const key = itemKey(s.id, g.title, item);
        const row = document.createElement('div');
        row.className = 'check-item' + (state[key] ? ' done' : '');
 
        const noteVal = notes[key] || '';
        // Change from input to textarea for multi-line support
        const noteHtml = `<textarea class="item-notes" placeholder="Notes…" rows="1">${noteVal.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>`;
 
        row.innerHTML = `
          <div class="checkbox">
            <svg class="checkmark" viewBox="0 0 11 8">
              <path d="M1 4l3 3 6-6"/>
            </svg>
          </div>
          <div class="item-content">
            <span class="item-label editable-text" contenteditable="true" spellcheck="false">${item}</span>
            ${noteHtml}
          </div>
          <button class="delete-btn" onclick="deleteItem(${sIndex}, ${gIndex}, ${iIndex})">✖</button>
        `;
        
        // Item Rename logic
        const labelEl = row.querySelector('.item-label');
        labelEl.addEventListener('blur', (e) => {
          const newItem = e.target.textContent.trim();
          if (newItem && newItem !== item) {
            const oldKey = itemKey(s.id, g.title, item);
            const newKey = itemKey(s.id, g.title, newItem);
            if (state[oldKey] !== undefined) { state[newKey] = state[oldKey]; delete state[oldKey]; }
            if (notes[oldKey] !== undefined) { notes[newKey] = notes[oldKey]; delete notes[oldKey]; }
            
            SECTIONS[sIndex].groups[gIndex].items[iIndex] = newItem;
            saveState(); saveSections(); build();
          } else {
            e.target.textContent = item;
          }
        });
        labelEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); } });
 
        row.addEventListener('click', e => {
          if (e.target.classList.contains('item-notes') || e.target.classList.contains('editable-text') || e.target.classList.contains('delete-btn')) return;
          toggleItem(key, row);
        });
        
        const notesInput = row.querySelector('.item-notes');
        notesInput.addEventListener('input', e => {
          notes[key] = e.target.value; 
          saveState();
          // Auto-resize logic
          e.target.style.height = 'auto';
          e.target.style.height = e.target.scrollHeight + 'px';
        });
        
        // Ensure previously saved notes resize properly on page load
        if (noteVal) {
          setTimeout(() => {
            notesInput.style.height = 'auto';
            notesInput.style.height = notesInput.scrollHeight + 'px';
          }, 0);
        }
 
        cl.appendChild(row);
      });
      
      const addItemBtn = document.createElement('button');
      addItemBtn.className = 'add-btn';
      addItemBtn.textContent = '+ Add Item';
      addItemBtn.onclick = () => addItem(sIndex, gIndex);
      cl.appendChild(addItemBtn);
 
      section.appendChild(cl);
    });
    
    const addGroupBtn = document.createElement('button');
    addGroupBtn.className = 'add-btn';
    addGroupBtn.textContent = '+ Add Category';
    addGroupBtn.style.marginTop = '20px';
    addGroupBtn.onclick = () => addGroup(sIndex);
    section.appendChild(addGroupBtn);
 
    wrap.appendChild(section);
  });
  
  // Add Section Button in Tabs
  const addSecTab = document.createElement('div');
  addSecTab.className = 'tab';
  addSecTab.style.display = 'none'; // Hidden by default
  addSecTab.classList.add('add-sec-tab');
  addSecTab.innerHTML = `<span style="font-size: 16px; font-weight: 800; line-height: 1;">+</span>`;
  addSecTab.onclick = addSection;
  tabsNav.appendChild(addSecTab);
  
  // If edit mode is on, ensure the + tab is visible
  if (isEditMode) {
      document.querySelectorAll('.add-sec-tab').forEach(el => el.style.display = 'flex');
  } else {
      document.querySelectorAll('.add-sec-tab').forEach(el => el.style.display = 'none');
  }
 
  updateProgress();
  if (!document.getElementById('search-input').dataset.initialized) {
     initSearch();
     document.getElementById('search-input').dataset.initialized = 'true';
  }
}
 
// Tie the style toggle for the add section tab to the main edit toggle
const originalToggleEditMode = toggleEditMode;
toggleEditMode = function() {
    originalToggleEditMode();
    document.querySelectorAll('.add-sec-tab').forEach(el => el.style.display = isEditMode ? 'flex' : 'none');
}

build();
</script>
</body>
